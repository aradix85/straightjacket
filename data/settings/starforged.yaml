# Starforged setting package
# Sci-fi frontier. Human-centric, scavenged future.

id: starforged
title: "Ironsworn: Starforged"
datasworn_id: starforged
description: >
  The Forge is a vast, chaotic expanse of space. Humanity fled here
  two generations ago. Settlements are scattered, resources scarce,
  dangers constant. You are a sworn adventurer, bound to dangerous
  quests in this perilous frontier.

# Oracle paths differ per setting. These tell the loader where to
# find character creation data in the Datasworn JSON.
oracle_paths:
  action_theme: ["core/action", "core/theme"]
  names: ["characters/name/given", "characters/name/family_name", "characters/name/callsign"]
  backstory: "campaign_launch/backstory_prompts"
  factions: "factions"

# Vocabulary: how this world describes its concepts.
# Substitutions feed into the narrator prompt as a <vocabulary> block.
vocabulary:
  substitutions:
    spaceship: "starship — worn, patched, held together by stubbornness"
    alien: "creature — strange biology, not sentient unless proven"
    gun: "sidearm or kinetic weapon"
    planet: "world — each one hostile in its own way"
    city: "settlement — a few hundred people at most, never a metropolis"
    whisper: "static — comms noise, interference, signal decay. Not voices"
    omen: "warning sign — sensor anomaly, debris pattern, structural stress"
  sensory_palette: >
    Metal, recycled air, hydraulic fluid, ozone, cold vacuum beyond
    the hull. Sounds: reactor hum, pressure seal hiss, boots on grating,
    comms crackle, cargo shifting. Light: strip lighting, instrument
    glow, starlight through ports. The Forge is industrial, cramped,
    and always slightly broken.

# Genre constraints for the validator.
# Starforged is sci-fi but grounded — no magic, no fantasy races.
genre_constraints:
  forbidden_terms:
    - "magic"
    - "spell"
    - "enchanted"
    - "elven"
    - "dwarven"
    - "dragon"
  forbidden_concepts:
    - "fantasy races (elves, dwarves, orcs)"
    - "magic systems or spellcasting"
  genre_test: ""  # Sci-fi permits most things — no strict conceptual test
  atmospheric_drift:
    # Fantasy/horror bleed
    - "eldritch"
    - "otherworldly"
    - "spectral"
    - "ethereal"
    - "supernatural"
    - "portent"
    - "prophecy"
    - "curse"
    - "cursed"
    - "ritual"
    - "sorcery"
    - "arcane"
    # Material animation (objects acting alive)
    - "weep"
    - "weeps"
    - "weeping"
    - "writhe"
    - "writhes"
    - "writhing"
    - "visage"
    - "visages"
    - "ooze"
    - "oozes"
    - "oozing"
    - "reshape"
    - "reshapes"
    - "reshaping"
    - "unnatural"
    - "unnaturally"
    - "apparition"
    - "phantasm"
    - "phantom"
    - "beckons"
    - "beckoning"
    # Qwen patterns (poetic material agency — only words that give
    # consciousness to inert matter. hums/pulses/exhales/thrums are
    # legitimate for machines and reactors in sci-fi.)
    - "sighs"
    - "awakens"
    - "waking"
    - "shimmers"
    - "shimmering"
  atmospheric_drift_threshold: 2

# Character creation flow flags.
# Controls which UI steps the client presents.
creation_flow:
  has_truths: true
  has_backstory_oracle: true
  has_name_tables: true
  has_ship_creation: false
  starting_asset_categories:   # Override engine.yaml for this setting
    - companion
    - module
    - command_vehicle
