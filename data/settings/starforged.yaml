
id: starforged
title: "Ironsworn: Starforged"
datasworn_id: starforged
description: >
  The Forge is a vast, chaotic expanse of space. Humanity fled here
  two generations ago. Settlements are scattered, resources scarce,
  dangers constant. You are a sworn adventurer, bound to dangerous
  quests in this perilous frontier.

oracle_paths:
  action_theme: ["core/action", "core/theme"]
  names: ["characters/name/given", "characters/name/family_name", "characters/name/callsign"]
  backstory: "campaign_launch/backstory_prompts"
  factions: "factions"

vocabulary:
  substitutions:
    spaceship: "starship — worn, patched, held together by stubbornness"
    alien: "creature — strange biology, not sentient unless proven"
    gun: "sidearm or kinetic weapon"
    planet: "world — each one hostile in its own way"
    city: "settlement — a few hundred people at most, never a metropolis"
    whisper: "static — comms noise, interference, signal decay. Not voices"
    omen: "warning sign — sensor anomaly, debris pattern, structural stress"
  sensory_palette: >
    Metal, recycled air, hydraulic fluid, ozone, cold vacuum beyond
    the hull. Sounds: reactor hum, pressure seal hiss, boots on grating,
    comms crackle, cargo shifting. Light: strip lighting, instrument
    glow, starlight through ports. The Forge is industrial, cramped,
    and always slightly broken.


creation_flow:
  has_truths: true
  has_backstory_oracle: true
  has_name_tables: true
  has_ship_creation: false
  starting_asset_categories:
    - companion
    - module
    - command_vehicle
