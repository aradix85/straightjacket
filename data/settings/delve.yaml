# Delve setting package
# Dungeon-crawling expansion for Ironsworn Classic.
# Requires Classic as base setting.

id: delve
title: "Ironsworn: Delve"
datasworn_id: delve
parent: classic  # Expansion — inherits Classic's vocabulary and constraints
description: >
  Beneath the Ironlands lie ancient sites: ruins, caverns, tangled
  depths. Delve adds site exploration, threats that lurk in the dark,
  and the denizens that guard forgotten places.

oracle_paths:
  action_theme: []  # Uses Classic's action/theme
  descriptor_focus: []
  names: []  # Uses Classic's names
  backstory: ""
  factions: ""

vocabulary:
  substitutions: {}  # Inherits from Classic
  sensory_palette: >
    Damp stone, dripping water, stale air, fungal rot, iron oxide,
    torch smoke, bat guano, crumbling mortar. Sounds: echoes, water
    trickle, rock shift, distant collapse, your own breathing.
    Light: torchlight, bioluminescence, absolute darkness.
    Underground is claustrophobic, cold, and indifferent.

genre_constraints:
  forbidden_terms: []  # Inherits from Classic
  forbidden_concepts: []
  genre_test: ""  # Inherits from Classic
  atmospheric_drift:
    # Same as Classic — Delve inherits Classic's world rules
    # Qwen patterns
    - "pulse"
    - "pulsing"
    - "thrum"
    - "thrumming"
    - "shimmer"
    - "shimmering"
    - "emanate"
    - "emanating"
    - "resonate"
    - "resonating"
    - "unseen force"
    - "portent"
    - "eldritch"
    - "otherworldly"
    - "spectral"
    - "ethereal"
    # GLM patterns
    - "weep"
    - "weeping"
    - "ooze"
    - "oozing"
    - "writhe"
    - "writhing"
    - "visage"
    - "visages"
    - "reshape"
    - "reshaping"
    - "unnatural"
    - "unnaturally"
    - "apparition"
    - "phantasm"
    - "phantom"
    - "beckoning"
  atmospheric_drift_threshold: 2
