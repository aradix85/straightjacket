# Sundered Isles setting package
# Science-fantasy seafaring. Pirates, cursed waters, ancient ruins.

id: sundered_isles
title: "Sundered Isles"
datasworn_id: sundered_isles
description: >
  Vast uncharted seas dotted with strange islands. Ancient ruins hold
  forgotten power. Cursed waters swallow the unwary. You captain a
  ship and crew, sworn to a life of discovery, piracy, or redemption
  on these sundered seas.

oracle_paths:
  action_theme: ["core/action", "core/theme"]
  descriptor_focus: ["core/descriptor", "core/focus"]
  names: ["character/name/given_name", "character/name/family_name"]
  backstory: ""  # Sundered Isles uses character/backstory if available
  factions: "faction"

vocabulary:
  substitutions:
    spaceship: "ship — wood, canvas, and iron on open water"
    planet: "island — each one a world unto itself"
    settlement: "port — trade, gossip, and trouble"
    computer: "chart or ledger — ink, not circuitry"
  sensory_palette: >
    Salt, tar, wet rope, gunpowder, rum, sun-bleached wood, barnacles,
    fish guts, canvas snapping in wind. Sounds: rigging creak, waves
    against hull, gulls, distant thunder, anchor chain, crew shanties.
    Light: tropical sun, lantern sway below decks, phosphorescence,
    storm light. The seas are vast, the ships are small.

genre_constraints:
  forbidden_terms: []  # Science-fantasy permits most things
  forbidden_concepts: []
  genre_test: ""  # No strict genre test — cursed waters and ancient ruins are on-genre
  atmospheric_drift:
    # Sci-fi bleed
    - "spaceship"
    - "computer"
    - "laser"
    - "robot"
    - "android"
    - "cybernetic"
    - "elven"
    - "dwarven"
    # GLM patterns (gothic material animation — out of place even in science-fantasy)
    - "weep"
    - "weeping"
    - "writhe"
    - "writhing"
    - "visage"
    - "visages"
    - "ooze"
    - "oozing"
    - "reshape"
    - "reshaping"
    - "unnatural"
    - "unnaturally"
    - "apparition"
    - "phantasm"
  atmospheric_drift_threshold: 2

creation_flow:
  has_truths: true
  has_backstory_oracle: false
  has_name_tables: true
  has_ship_creation: true       # Sundered Isles: ship is part of character
  starting_asset_categories:
    - companion
    - module
    - command_vehicle
