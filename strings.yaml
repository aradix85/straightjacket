help.chaos_text: Measures tension (3–9). Rises on misses, falls on successes. High chaos can trigger unexpected scene interrupts.
help.chaos_title: '**Chaos Factor**'
help.clocks_text: Threats tick in the background. Misses fill threat clocks. Full clock = something bad happens.
help.clocks_title: '**Clocks**'
help.correction_example: 'Example: ## I didn''t want to attack, just talk'
help.correction_text: 'Something went wrong? Type ## before your message to correct the last turn. For example if the narrator misunderstood what you meant.'
help.correction_title: '**Correction**'
help.crisis_text: Health OR Spirit at 0 = Crisis mode. Both at 0 = dramatic finale.
help.crisis_title: '**Crisis**'
help.freedom_text: You can do anything. Just say what you do — the world responds. You can also introduce new elements into the world.
help.freedom_title: '**Player Freedom**'
help.intro_text: Just write what your character does or says — in your own words. "I sneak past the guard", "I ask the innkeeper about the stranger" — the game handles the rest.
help.intro_title: '**How do you play?**'
help.match_text: When both challenge dice (d10) show the same number, it's a fateful roll — something special happens! On a hit + match = an unexpected advantage. On a miss + match = dramatic escalation.
help.match_title: '**Fateful Roll (Match)**'
help.momentum_text: Builds on successes. On a miss or weak hit, you can burn momentum — resets to 0, but upgrades the result.
help.momentum_title: '**Momentum** (-6 to +10)'
help.pos_controlled: <b>Controlled</b>
help.pos_controlled_desc: Advantage, milder consequences
help.pos_desperate: <b>Desperate</b>
help.pos_desperate_desc: Disadvantage, harsher consequences
help.pos_risky: <b>Risky</b>
help.pos_risky_desc: Standard, anything can happen
help.position_text: How dangerous is the situation? The game automatically judges how risky your action is — this affects how bad things can get on a miss.
help.position_title: '**Position & Effect**'
help.probe_detail: <b>2d6 + Attribute</b> (your action roll, max 10)<br>vs <b>2d10</b> (the challenge)
help.probe_text: 'When you attempt something risky, dice are rolled:'
help.probe_title: '**Roll**'
help.result_miss: <b>Miss</b>
help.result_miss_desc: Beats neither d10 → Something goes wrong
help.result_strong: <b>Strong Hit</b>
help.result_strong_desc: Action roll beats both d10 → Clean success
help.result_weak: <b>Weak Hit</b>
help.result_weak_desc: Beats one d10 → Success with complication
help.results_text: 'Every roll has three possible outcomes:'
help.results_title: '**Results**'
