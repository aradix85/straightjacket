# Straightjacket Test Player Bot — Elvira Configuration
# Uses the same AI provider as the engine (config.yaml).
# Set your API key via config.yaml or the env var configured there.

username: "elvira"

auto_mode: true

game:
  load_existing: false
  save_name: "autosave"
  # Datasworn creation fields. Leave blank to roll randomly.
  setting_id: "starforged"          # starforged, classic, sundered_isles (blank = random)
  player_name: ""                   # blank = roll from oracle
  pronouns: ""                      # blank = random
  # paths: set in code (random 2)
  backstory: ""                     # blank = roll from oracle
  background_vow: ""                # blank = roll meaning pair
  # stats: leave empty for random valid allocation (sum=7, each 0-3)
  stats: {}
  wishes: ""
  content_lines: ""

session:
  max_chapters: 2                  # 1 = single story, 2+ = campaign with chapter transitions
  max_turns: 25                    # per chapter (not total)
  narration_lang: "English"
  save_every_n_turns: 5
  save_name_output: "elvira"       # save slot name (clean_before_run deletes this before starting)
  clean_before_run: true           # delete previous save + archives before starting a new run

bot_behavior:
  burn_momentum: "auto"
  style: "explorer"
  # Options:
  #   explorer   — tries every location, questions every NPC
  #   aggressor  — picks the riskiest action every turn
  #   dialogist  — prefers conversation over action
  #   chaosagent — deliberately unusual, short, or boundary-testing inputs
  #   balanced   — natural mixed playstyle (good for regression testing)

logging:
  log_file: "elvira_session.json"
  full_debug_log: false              # true = also write elvira_session_full.json with complete turn data
  print_full_narration: false
  print_roll_details: true
  assert_state_invariants: true
