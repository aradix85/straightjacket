chapter_validator:
  max_retries: 2

  violation_templates:
    chapter_npc_contradiction: "CHAPTER CONTRADICTION: narrative claims NPC '{name}' is dead/killed but engine state is '{status}' — rewrite without claiming death"
    chapter_track_contradiction: "CHAPTER CONTRADICTION: narrative claims track '{name}' is completed but engine state is '{status}' — rewrite without claiming completion"
    chapter_threat_contradiction: "CHAPTER CONTRADICTION: narrative claims threat '{name}' is resolved/defeated but engine state is '{status}' — rewrite without claiming resolution"

  death_keywords:
  - died
  - dies
  - killed
  - kills
  - slain
  - dead
  - perished
  - murdered
  - executed
  - lost
  - fell

  completion_keywords:
  - completed
  - finished
  - fulfilled
  - achieved
  - accomplished

  resolution_keywords:
  - resolved
  - overcome
  - defeated
  - vanquished
  - banished
  - destroyed
  - ended
