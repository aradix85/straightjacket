keyed_scenes:
  # Director-pre-defined narrative beats that override the chaos check at
  # scene start. When a keyed scene matches its trigger, it replaces the
  # normal expected/altered/interrupt outcome for that turn. The matched
  # scene is removed from narrative.keyed_scenes after firing — keyed
  # scenes are one-shot, never repeated.
  #
  # Spawning is out of scope for step 4. The Adventure Crafter (step 7)
  # is the engine's keyed-scene spawner: AC turning points and plot beats
  # that map deterministically onto an engine trigger get written into
  # narrative.keyed_scenes by AC. Until step 7 lands the list stays empty
  # in normal play, the keyed-priority branch in check_scene is dormant,
  # and tests seed the list directly to exercise the evaluator.
  #
  # Priority order in check_scene: keyed > interrupt > altered > expected.

  # Registered trigger types. Each entry binds:
  #   value_format:  human-readable description of trigger_value's shape, used
  #                  when constructing a KeyedScene to validate the value
  #                  parses cleanly. The evaluator function is the source of
  #                  truth for parse semantics.
  #   description:   what state the trigger watches for.
  #
  # Adding a trigger type means: add an entry here, add a matching
  # evaluator function in mechanics/keyed_scenes.py, register it in
  # _EVALUATORS in that module. trigger_type validation in
  # KeyedScene.__post_init__ reads the keys of this map — unknown
  # trigger types raise on construction.
  triggers:
    clock_fills:
      value_format: "<clock_name>:<segments_filled>"
      description: "A clock with the given name has at least the given number of segments filled."
    threat_menace_phase:
      value_format: "<threat_name>:<filled_boxes>"
      description: "A threat's menace track has at least the given filled_boxes (0..10)."
    bond_threshold:
      value_format: "<npc_id>:<filled_boxes>"
      description: "An NPC's connection track has at least the given filled_boxes (0..10)."
    chaos_extreme:
      value_format: "min | max"
      description: "Chaos factor is at its configured minimum or maximum."
    scene_count:
      value_format: "<n>"
      description: "Narrative scene_count has reached at least n."
    # NOTE: thread_phase is deferred to step 31 (thread progress tracks).
    # Registering it here without an evaluator would create a half-wired
    # trigger that raises on use; step 31 adds it cleanly.

  # AI-facing wrapper for the narrative_hint when a keyed scene fires.
  # Engine-internal template; the {hint} placeholder is the KeyedScene's
  # narrative_hint field as written by the spawner.
  prompt_wrapper: "<keyed_scene>{hint}</keyed_scene>"
