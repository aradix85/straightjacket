ai_text:
  schema_titles:
    brain_output: brain_output
    director_output: director_output
    story_architect_output: story_architect_output
    chapter_summary_output: chapter_summary_output
    narrator_metadata: narrator_metadata
    opening_setup: opening_setup
    correction_output: correction_output
    revelation_check: revelation_check
    validator: validator
    architect_validator: architect_validator
  brain_trigger_hints:
    dialog: pure conversation with an NPC, no risk, no action, no world declarations
    ask_the_oracle: yes/no or open question about the fiction, not an action
    world_shaping: player DECLARES a new fact about the world — 'there is a well', 'the door has a lock', 'I say there's a
      market nearby'. NOT dialog (no NPC addressed). NOT a question (that is ask_the_oracle). The player is TELLING the fiction
      what exists.
    adventure/face_danger: attempt something risky or react to an imminent threat RIGHT NOW (not preparation, not investigation)
    adventure/gather_information: search for clues, investigate, study, research, analyze evidence — the goal is to LEARN
      something unknown (not to gain a tactical edge — that is secure_an_advantage)
    adventure/secure_an_advantage: prepare, position, set up, hide, scout ahead, gain leverage BEFORE acting — the goal is
      a TACTICAL EDGE for the next action (not to discover new information — that is gather_information)
  schema_descriptions:
    revelation_check:
      revelation_confirmed: True if the narration clearly contains or foreshadows the revelation.
      reasoning: One sentence explaining why.
    validator:
      pass: true if narration respects all constraints
      correction: One-sentence fix instruction. Empty if pass=true.
    architect_validator:
      pass: true if blueprint respects genre constraints
      fixed_conflict: Rewritten central_conflict for genre. Empty if pass=true.
      fixed_antagonist: Rewritten antagonist_force for genre. Empty if pass=true.
  consequence_labels:
    momentum_change: momentum {value}
    track_gain: '{track} +{n}'
    track_loss: '{track} -{n}'
    integrity_change: integrity {value}
    mark_progress: mark progress ×{n}
    next_move_bonus: next move +{n}
    legacy_reward: legacy reward ({track})
    clock_fill: clock +{n}
    bond_progress: '{name} bond progress +{n} ticks'
    disposition_shift: '{name} disposition {old}→{new}'
    mark_impact: mark {impact}
    clear_impact: clear {impact}
    threshold_vow: swear a deathbound vow
  validator_blocks:
    correction_mode_open: 'Your previous narration was rejected. Rewrite following these instructions:'
    rewrite_user_prefix: 'Your narration above violated constraints:'
    rewrite_user_suffix: Rewrite the COMPLETE scene following the original prompt below. Keep what worked, fix what was flagged.
    unmatched_violation_template: 'Fix: {violation}'
    momentum_burn_injection: <momentum_burn>Character digs deep, turns the tide.</momentum_burn>
  narrator_defaults:
    unknown_location: unknown
    unknown_time: unspecified
    unknown_transition_trigger: '?'
    split_default_name: Unknown
    no_npcs: (none)
    no_npcs_yet: none yet
    no_npcs_nearby: no one nearby
    no_roll: dialog (no roll)
    npc_appeared_event: '{npc_name} appeared'
    unnamed_track: Unnamed conflict
    reflection_tone_fallback: reflective
    default_act_mood:
    - tense
    - grounded
    recap_fallback: ({player_name} recalls the recent events...)
    chapter_summary_fallback_title: Chapter {chapter}
    chapter_summary_fallback_text: '{player_name} had an adventure in {location}.'
    new_chapter_threads_template: 'New chapter. Open threads: {threads}'
    new_chapter_blank: A new chapter begins.
    npc_agency_action_template: 'NPC "{npc_name}" pursues agenda "{agenda}" — concrete offscreen action.'
    clock_filled_template: 'CLOCK FILLED "{clock_name}": {trigger}'
  architect_labels:
    forbidden_terms_prefix: Forbidden terms
    forbidden_concepts_prefix: Forbidden concepts
    genre_test_prefix: Test
