<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Straightjacket</title>
<style>
:root {
  --bg: #111; --bg-surface: #1a1a1a; --bg-hover: #252525;
  --text: #e0e0e0; --text-dim: #888; --text-accent: #f59e0b;
  --border: #333; --error: #ef4444; --success: #22c55e;
  --dialog-color: #fbbf24;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
a:focus, button:focus, input:focus, textarea:focus, select:focus { outline: 2px solid var(--text-accent); outline-offset: 2px; }
button { cursor: pointer; background: var(--bg-surface); color: var(--text); border: 1px solid var(--border); padding: 0.5rem 1rem; border-radius: 4px; font-size: 0.9rem; }
button:hover { background: var(--bg-hover); }
button.primary { background: var(--text-accent); color: #000; border-color: var(--text-accent); font-weight: 600; }
input, textarea, select { background: var(--bg-surface); color: var(--text); border: 1px solid var(--border); padding: 0.5rem; border-radius: 4px; font-size: 0.9rem; font-family: inherit; }
input:focus, textarea:focus, select:focus { border-color: var(--text-accent); }
textarea { resize: vertical; }
.hidden { display: none !important; }
main { max-width: 48rem; width: 100%; margin: 0 auto; padding: 0 1rem; flex: 1; display: flex; flex-direction: column; }
#chat-log { flex: 1; overflow-y: auto; padding: 1rem 0; }
.msg { margin-bottom: 1rem; line-height: 1.7; }
.msg-narrator { white-space: pre-wrap; }
.msg-narrator .dialog { color: var(--dialog-color); }
.msg-player { color: var(--text-dim); font-style: italic; padding-left: 0.5rem; border-left: 2px solid var(--border); }
.msg-system { color: var(--text-dim); font-size: 0.85rem; }
.msg-recap { color: var(--text-dim); font-style: italic; border-left: 2px solid var(--text-accent); padding-left: 0.5rem; }
.msg-epilogue { border-left: 3px solid var(--text-accent); padding-left: 0.75rem; }
.msg-correction { opacity: 0.7; }
.msg-correction::before { content: "✎ "; }
.msg-status { color: var(--text-accent); font-size: 0.85rem; padding: 0.5rem 0; border: 1px solid var(--border); border-radius: 4px; padding: 0.75rem; margin-bottom: 1rem; }
#input-bar { position: sticky; bottom: 0; background: var(--bg); border-top: 1px solid var(--border); padding: 0.5rem 0; }
#input-bar form { display: flex; gap: 0.5rem; }
#input-bar input[type="text"] { flex: 1; }
#action-bar { display: flex; gap: 0.5rem; padding: 0.3rem 0; flex-wrap: wrap; }
#action-bar button { font-size: 0.8rem; padding: 0.3rem 0.6rem; }
.panel { padding: 2rem 0; }
.panel h2 { font-size: 1.2rem; margin-bottom: 1rem; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 0.85rem; color: var(--text-dim); margin-bottom: 0.3rem; }
.field input, .field textarea, .field select { width: 100%; }
.player-btn { display: block; width: 100%; text-align: left; margin-bottom: 0.5rem; padding: 0.75rem 1rem; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 200; }
.overlay-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; max-width: 28rem; width: 90%; }
.overlay-card h2 { margin-bottom: 0.75rem; }
.overlay-card .actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
#error-banner { background: var(--error); color: #fff; text-align: center; padding: 0.5rem; display: none; }
#reconnect-banner { background: var(--text-accent); color: #000; text-align: center; padding: 0.5rem; display: none; }
</style>
</head>
<body>

<div id="reconnect-banner"></div>
<div id="error-banner"></div>

<main>
  <h1 id="app-title" style="padding:0.75rem 0;font-size:1.1rem;border-bottom:1px solid var(--border)"></h1>

  <!-- Player selection -->
  <div id="phase-players" class="panel">
    <h2 id="who-plays"></h2>
    <div id="player-list"></div>
    <div class="field" style="margin-top:1rem">
      <label for="new-player-name" id="new-player-label"></label>
      <div style="display:flex;gap:0.5rem">
        <input type="text" id="new-player-name">
        <button id="create-player-btn" class="primary"></button>
      </div>
    </div>
  </div>

  <!-- Character creation -->
  <div id="phase-creation" class="panel hidden">
    <h2 id="creation-heading"></h2>
    <div id="creation-form"></div>
  </div>

  <!-- Game -->
  <div id="phase-game" class="hidden" style="display:flex;flex-direction:column;flex:1">
    <div id="chat-log" role="log" aria-live="polite"></div>
    <div id="input-bar">
      <div id="action-bar">
        <button id="btn-status"></button>
        <button id="btn-saves"></button>
      </div>
      <form id="input-form">
        <input type="text" id="player-input" autocomplete="off">
        <button type="submit">→</button>
      </form>
    </div>
  </div>

  <!-- Burn offer -->
  <div id="burn-overlay" class="overlay hidden" role="alertdialog">
    <div class="overlay-card">
      <h2 id="burn-title"></h2>
      <p id="burn-text"></p>
      <div class="actions">
        <button id="burn-yes" class="primary"></button>
        <button id="burn-no"></button>
      </div>
    </div>
  </div>

  <!-- Story complete -->
  <div id="complete-overlay" class="overlay hidden" role="alertdialog">
    <div class="overlay-card">
      <h2 id="complete-title"></h2>
      <p id="complete-text"></p>
      <div class="actions">
        <button id="complete-continue"></button>
        <button id="complete-epilogue" class="primary"></button>
      </div>
    </div>
  </div>

  <!-- Game over -->
  <div id="gameover-overlay" class="overlay hidden" role="alertdialog">
    <div class="overlay-card">
      <h2 id="gameover-title"></h2>
      <div class="actions">
        <button id="gameover-chapter"></button>
        <button id="gameover-restart"></button>
      </div>
    </div>
  </div>
</main>

<script>
// ── State ────────────────────────────────────────────────────
let ws = null;
let retries = 0;
let sessionTaken = false;
let currentPlayer = "";
let lastState = null;

// UI strings from server (strings.yaml)
let S = {};
function s(key, vars) {
  let t = S[key] || key;
  if (vars) Object.entries(vars).forEach(([k,v]) => { t = t.replace(`{${k}}`, v); });
  return t;
}

const MAX_RETRIES = 5;
const RETRY_MS = 3000;

const $ = (id) => document.getElementById(id);
const phasePlayers = $("phase-players");
const phaseCreation = $("phase-creation");
const phaseGame = $("phase-game");
const chatLog = $("chat-log");
const errorBanner = $("error-banner");
const reconnectBanner = $("reconnect-banner");
const playerInput = $("player-input");
const inputForm = $("input-form");

function showPhase(phase) {
  phasePlayers.classList.toggle("hidden", phase !== "players");
  phaseCreation.classList.toggle("hidden", phase !== "creation");
  phaseGame.classList.toggle("hidden", phase !== "game");
  if (phase === "game") phaseGame.style.display = "flex";
}

// Apply strings to static HTML elements
function applyStrings() {
  $("app-title").textContent = s("ui.title");
  $("who-plays").textContent = s("ui.who_plays");
  $("new-player-label").textContent = s("ui.new_player");
  $("new-player-name").placeholder = s("ui.name_placeholder");
  $("create-player-btn").textContent = s("ui.create");
  $("creation-heading").textContent = s("ui.create_character");
  $("chat-log").setAttribute("aria-label", s("ui.game_log"));
  $("input-form").setAttribute("aria-label", s("ui.player_input"));
  $("player-input").placeholder = s("ui.input_placeholder");
  $("player-input").setAttribute("aria-label", s("ui.input_placeholder"));
  $("input-form").querySelector("button").setAttribute("aria-label", s("ui.send"));
  $("btn-status").textContent = s("ui.status");
  $("btn-saves").textContent = s("ui.save_load");
  $("burn-title").textContent = s("ui.burn_title");
  $("burn-overlay").setAttribute("aria-label", s("ui.burn_title"));
  $("burn-yes").textContent = s("ui.burn_yes");
  $("burn-no").textContent = s("ui.burn_no");
  $("complete-title").textContent = s("ui.complete_title");
  $("complete-text").textContent = s("ui.complete_text");
  $("complete-overlay").setAttribute("aria-label", s("ui.complete_title"));
  $("complete-continue").textContent = s("ui.keep_playing");
  $("complete-epilogue").textContent = s("ui.generate_epilogue");
  $("gameover-title").textContent = s("ui.gameover_title");
  $("gameover-overlay").setAttribute("aria-label", s("ui.gameover_title"));
  $("gameover-chapter").textContent = s("ui.new_chapter");
  $("gameover-restart").textContent = s("ui.start_over");
  $("btn-status").onclick = () => showStatus();
  $("btn-saves").onclick = () => showSaves();
}

// ── WebSocket ────────────────────────────────────────────────
function connect() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onopen = () => {
    retries = 0;
    reconnectBanner.style.display = "none";
    errorBanner.style.display = "none";
  };
  ws.onclose = () => {
    if (sessionTaken) return;
    if (retries < MAX_RETRIES) {
      retries++;
      reconnectBanner.style.display = "block";
      reconnectBanner.textContent = s("ui.reconnecting", {retries, max: MAX_RETRIES});
      setTimeout(connect, RETRY_MS);
    } else {
      reconnectBanner.innerHTML = `${s("ui.connection_lost")} <button onclick="retries=0;connect()">${s("ui.retry")}</button>`;
    }
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    switch (msg.type) {
      case "ui_strings": S = msg.strings || {}; applyStrings(); break;
      case "players_list": renderPlayerList(msg.players); break;
      case "player_selected": onPlayerSelected(msg); break;
      case "saves_list": renderSavesList(msg.saves); break;
      case "narration": appendNarration(msg); break;
      case "replace_narration": replaceLast(msg.text); break;
      case "state": onState(msg.data); break;
      case "status": showStatusMsg(msg.text); break;
      case "recap": appendRecap(msg.text); break;
      case "epilogue": appendEpilogue(msg.text); break;
      case "scene_marker": appendSceneHeading(msg.scene, msg.location); break;
      case "burn_offer": showBurnOffer(msg); break;
      case "story_complete": $("complete-overlay").classList.remove("hidden"); raf(() => $("complete-epilogue").focus()); break;
      case "game_over": $("gameover-overlay").classList.remove("hidden"); raf(() => $("gameover-chapter").focus()); break;
      case "chapter_started": onChapterStarted(msg); break;
      case "retry_available": showRetryOffer(msg.text); break;
      case "session_taken": onSessionTaken(); break;
      case "error": showError(msg.text); break;
    }
  };
}

function send(obj) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(obj)); }

// ── Player list ─────────────────────────────────────────────
function renderPlayerList(players) {
  showPhase("players");
  const list = $("player-list");
  list.innerHTML = "";
  players.forEach(name => {
    const row = document.createElement("div");
    row.style.cssText = "display:flex;gap:0.5rem;margin-bottom:0.5rem";
    const btn = document.createElement("button");
    btn.style.flex = "1"; btn.style.textAlign = "left";
    btn.textContent = name;
    btn.onclick = () => send({type: "select_player", name});
    const del = document.createElement("button");
    del.textContent = "✕";
    del.setAttribute("aria-label", s("ui.delete") + " " + name);
    del.onclick = () => { if (confirm(s("ui.delete_confirm"))) send({type: "delete_player", name}); };
    row.appendChild(btn); row.appendChild(del);
    list.appendChild(row);
  });
}

$("create-player-btn").onclick = () => {
  const name = $("new-player-name").value.trim();
  if (name) send({type: "create_player", name});
};

// ── Player selected ─────────────────────────────────────────
function onPlayerSelected(msg) {
  currentPlayer = msg.name;
  if (msg.has_game && msg.state) {
    showPhase("game");
    chatLog.innerHTML = "";
    (msg.messages || []).forEach(m => {
      if (m.role === "assistant") appendHTML("msg msg-narrator", m.content);
      else if (m.role === "user") appendText("msg msg-player", m.content);
    });
    onState(msg.state);
    scroll();
    playerInput.focus();
  } else if (msg.creation_options) {
    showPhase("creation");
    renderCreationForm(msg.creation_options);
  } else {
    showPhase("creation");
  }
}

// ── Chat rendering ──────────────────────────────────────────
function appendNarration(msg) {
  clearStatus();
  if (msg.scene && msg.location) appendSceneHeading(msg.scene, msg.location);
  appendHTML("msg msg-narrator", msg.text);
  scroll();
  announce(msg.text.replace(/<[^>]*>/g, "").substring(0, 300));
}
function appendHTML(cls, html) {
  const div = document.createElement("div");
  div.className = cls;
  div.innerHTML = html;
  chatLog.appendChild(div);
}
function appendText(cls, text) {
  const div = document.createElement("div");
  div.className = cls;
  div.textContent = text;
  chatLog.appendChild(div);
}
function appendSceneHeading(scene, loc) {
  const h = document.createElement("h2");
  h.style.cssText = "font-size:0.9rem;color:var(--text-dim);margin:1.5rem 0 0.5rem;border-bottom:1px solid var(--border);padding-bottom:0.3rem";
  const label = s("ui.scene_marker", {n: scene});
  h.textContent = loc ? `${label} — ${loc}` : label;
  if (chatLog.lastElementChild?.tagName === "H2" && chatLog.lastElementChild.textContent === h.textContent) return;
  chatLog.appendChild(h);
}
function appendRecap(text) {
  clearStatus();
  appendText("msg msg-recap", text);
  scroll();
}
function appendEpilogue(html) {
  clearStatus();
  appendHTML("msg msg-epilogue", html);
  scroll();
}
function replaceLast(html) {
  clearStatus();
  const narrations = chatLog.querySelectorAll(".msg-narrator");
  const last = narrations[narrations.length - 1];
  if (last) last.innerHTML = html;
  scroll();
}

let _statusEl = null;
function showStatusMsg(text) {
  if (_statusEl && _statusEl.textContent === text) return;
  clearStatus();
  const div = document.createElement("div");
  div.className = "msg msg-status";
  div.textContent = text;
  chatLog.appendChild(div);
  _statusEl = div;
  scroll();
}
function clearStatus() { if (_statusEl) { _statusEl.remove(); _statusEl = null; } }

function scroll() { raf(() => chatLog.scrollTop = chatLog.scrollHeight); }

// ── State ───────────────────────────────────────────────────
function onState(state) { lastState = state; }

// ── Input ───────────────────────────────────────────────────
inputForm.onsubmit = (e) => {
  e.preventDefault();
  const text = playerInput.value.trim();
  if (!text) return;
  playerInput.value = "";

  if (text.toLowerCase() === "recap") {
    send({type: "recap"});
    return;
  }
  if (text.startsWith("##")) {
    appendText("msg msg-player msg-correction", text);
    send({type: "correction", text: text.replace(/^#+\s*/, "")});
    return;
  }
  appendText("msg msg-player", text);
  send({type: "player_input", text});
  scroll();
};

// ── Status display ──────────────────────────────────────────
function showStatus() {
  if (!lastState) return;
  const st = lastState;
  const lines = [];
  lines.push(`${st.player_name} — ${st.character_concept || ""}`);
  lines.push(`${s("ui.scene_marker", {n: st.scene})} | ${st.location || "?"} | ${st.time_label || ""}`);
  Object.entries(st.stats).forEach(([k,v]) => { lines.push(`${v.label}: ${v.value}`); });
  lines.push(`${s("ui.status_health")}: ${st.health} | ${s("ui.status_spirit")}: ${st.spirit} | ${s("ui.status_supply")}: ${st.supply}`);
  lines.push(`${s("ui.status_momentum")}: ${st.momentum}/${st.max_momentum} | ${s("ui.status_chaos")}: ${st.chaos}`);
  if (st.npcs?.length) {
    lines.push("");
    st.npcs.forEach(n => {
      let line = `${n.name} ${n.disposition_label} B${n.bond}/${n.bond_max}`;
      if (n.status === "background") line += ` ${s("ui.status_bg")}`;
      if (n.status === "deceased") line += ` ${s("ui.status_deceased")}`;
      lines.push(line);
    });
  }
  if (st.clocks?.length) {
    lines.push("");
    st.clocks.forEach(c => {
      lines.push(`${c.name} ${c.filled}/${c.segments}${c.fired ? " " + s("ui.status_fired") : ""}`);
    });
  }
  if (st.story_arc) {
    const a = st.story_arc;
    lines.push(`\n${s("ui.status_act", {n: a.act_number, total: a.total_acts, title: a.title, phase: a.phase_label, progress: a.progress})}`);
  }
  const div = document.createElement("div");
  div.className = "msg msg-system";
  div.textContent = lines.join("\n");
  chatLog.appendChild(div);
  scroll();
}

// ── Saves ───────────────────────────────────────────────────
function showSaves() { send({type: "list_saves"}); }
function renderSavesList(saves) {
  const div = document.createElement("div");
  div.className = "msg msg-system";
  const title = document.createElement("strong");
  title.textContent = s("ui.saves");
  div.appendChild(title);
  div.appendChild(document.createElement("br"));
  if (saves.length === 0) {
    div.appendChild(document.createTextNode(s("ui.no_saves")));
    div.appendChild(document.createElement("br"));
  }
  saves.forEach(sv => {
    const loadBtn = document.createElement("button");
    loadBtn.textContent = `${s("ui.load")}: ${sv.name} (scene ${sv.scene_count || "?"})`;
    loadBtn.onclick = () => send({type: "load", name: sv.name});
    div.appendChild(loadBtn);
    div.appendChild(document.createTextNode(" "));
    if (sv.name !== "autosave") {
      const delBtn = document.createElement("button");
      delBtn.textContent = "✕";
      delBtn.style.color = "var(--error)";
      delBtn.onclick = () => { if (confirm(s("ui.delete_confirm"))) send({type: "delete_save", name: sv.name}); };
      div.appendChild(delBtn);
    }
    div.appendChild(document.createElement("br"));
  });
  const saveLabel = document.createElement("label");
  saveLabel.textContent = s("ui.save_as") + ": ";
  const saveInput = document.createElement("input");
  saveInput.type = "text";
  saveInput.placeholder = s("ui.name_placeholder");
  saveInput.style.width = "8rem";
  saveLabel.appendChild(saveInput);
  div.appendChild(saveLabel);
  div.appendChild(document.createTextNode(" "));
  const saveBtn = document.createElement("button");
  saveBtn.className = "primary";
  saveBtn.textContent = s("ui.save");
  saveBtn.onclick = () => { const n = saveInput.value.trim(); if (n) send({type: "save", name: n}); };
  div.appendChild(saveBtn);
  chatLog.appendChild(div);
  scroll();
  raf(() => { const first = div.querySelector("button"); if (first) first.focus(); });
}

// ── Burn offer ──────────────────────────────────────────────
function showBurnOffer(msg) {
  $("burn-text").textContent = s("ui.burn_text", {current: msg.current, upgrade: msg.upgrade, cost: msg.cost});
  $("burn-overlay").classList.remove("hidden");
  raf(() => $("burn-yes").focus());
}
$("burn-yes").onclick = () => {
  $("burn-overlay").classList.add("hidden");
  send({type: "burn_momentum", accept: true});
  playerInput.focus();
};
$("burn-no").onclick = () => {
  $("burn-overlay").classList.add("hidden");
  send({type: "burn_momentum", accept: false});
  playerInput.focus();
};

// ── Story complete / game over ──────────────────────────────
$("complete-continue").onclick = () => {
  $("complete-overlay").classList.add("hidden");
  send({type: "dismiss_epilogue"});
  playerInput.focus();
};
$("complete-epilogue").onclick = () => {
  $("complete-overlay").classList.add("hidden");
  send({type: "generate_epilogue"});
  playerInput.focus();
};
$("gameover-chapter").onclick = () => {
  $("gameover-overlay").classList.add("hidden");
  send({type: "new_chapter"});
};
$("gameover-restart").onclick = () => {
  $("gameover-overlay").classList.add("hidden");
  send({type: "list_players"});
};

// ── Chapter started ─────────────────────────────────────────
function onChapterStarted(msg) {
  clearStatus();
  chatLog.innerHTML = "";
  appendSceneHeading(1, "");
  appendHTML("msg msg-narrator", msg.narration);
  scroll();
  playerInput.focus();
}

// ── Retry / session taken / error ───────────────────────────
function showRetryOffer(text) {
  const div = document.createElement("div");
  div.className = "msg msg-system";
  div.appendChild(document.createTextNode(s("ui.retry_text") + ': "' + text + '" '));
  const btn = document.createElement("button");
  btn.textContent = s("ui.retry");
  btn.onclick = () => send({type: "player_input", text});
  div.appendChild(btn);
  chatLog.appendChild(div);
  scroll();
}

function onSessionTaken() {
  sessionTaken = true;
  reconnectBanner.style.display = "block";
  reconnectBanner.textContent = s("ui.session_taken");
  reconnectBanner.style.background = "var(--error)";
  reconnectBanner.style.color = "#fff";
}

function showError(text) {
  clearStatus();
  errorBanner.textContent = text;
  errorBanner.style.display = "block";
  setTimeout(() => { errorBanner.style.display = "none"; }, 8000);
}

// ── Character creation ──────────────────────────────────────
function renderCreationForm(options) {
  const form = $("creation-form");
  const settings = options.settings || [];
  const sc = options.stat_constraints || {target_sum: 9, min: 0, max: 3};
  const cd = options.creation_defaults || {max_paths: 2, background_vow_default_rank: "extreme", vow_ranks: ["troublesome","dangerous","formidable","extreme","epic"]};
  if (settings.length === 0) { form.innerHTML = `<p>${s("ui.no_settings")}</p>`; return; }

  let html = "";

  // Setting picker
  html += `<div class="field"><label>${s("ui.setting")}</label>`;
  settings.forEach((st, i) => {
    html += `<label style="display:block;margin-bottom:0.5rem;cursor:pointer">`;
    html += `<input type="radio" name="setting" value="${esc(st.id)}" ${i===0?"checked":""}> `;
    html += `<strong>${esc(st.title)}</strong> — ${esc(st.description)}</label>`;
  });
  html += `</div>`;

  // Name + roll button
  html += `<div class="field"><label for="c-name">${s("ui.character_name")}</label>`;
  html += `<div style="display:flex;gap:0.5rem"><input type="text" id="c-name" value="${esc(currentPlayer)}" style="flex:1">`;
  html += `<button type="button" id="roll-name-btn">${s("ui.name_roll")}</button></div></div>`;

  // Pronouns
  html += `<div class="field"><label for="c-pronouns">${s("ui.pronouns")}</label><select id="c-pronouns"><option value="">—</option><option value="he/him">he/him</option><option value="she/her">she/her</option><option value="they/them">they/them</option></select></div>`;

  // Paths
  html += `<div class="field"><label>${s("ui.paths")}</label><div style="display:flex;gap:0.5rem"><select id="c-path1" style="flex:1"></select><select id="c-path2" style="flex:1"></select></div></div>`;

  // Truths container (populated per setting)
  html += `<div class="field" id="truths-container"></div>`;

  // Backstory
  html += `<div class="field"><label for="c-backstory">${s("ui.backstory")}</label>`;
  html += `<div style="display:flex;gap:0.5rem;align-items:start"><textarea id="c-backstory" rows="3" style="flex:1"></textarea>`;
  html += `<button type="button" id="roll-backstory-btn">${s("ui.backstory_prompt")}</button></div></div>`;

  // Vow + rank
  html += `<div class="field"><label for="c-vow">${s("ui.background_vow")}</label><input type="text" id="c-vow"></div>`;
  html += `<div class="field"><label for="c-vow-rank">${s("ui.vow_rank")}</label><select id="c-vow-rank">`;
  cd.vow_ranks.forEach(r => { html += `<option value="${r}" ${r===cd.background_vow_default_rank?"selected":""}>${r}</option>`; });
  html += `</select></div>`;
  html += `<div class="field"><label for="c-vow-subject">${s("ui.vow_subject")}</label><input type="text" id="c-vow-subject"></div>`;

  // Starting asset container
  html += `<div class="field" id="asset-container"></div>`;

  // Stats
  html += `<div class="field"><label>${s("ui.stats_label", {target: sc.target_sum, min: sc.min, max: sc.max})}</label><div style="display:flex;gap:0.5rem;flex-wrap:wrap">`;
  ["edge","heart","iron","shadow","wits"].forEach(st => {
    html += `<label>${st}: <input type="number" class="stat-input" data-stat="${st}" min="${sc.min}" max="${sc.max}" value="1" style="width:3rem"></label>`;
  });
  html += `</div><div id="stat-total" style="font-size:0.8rem"></div></div>`;

  // Content boundaries + wishes
  html += `<div class="field"><label for="c-boundaries">${s("ui.content_boundaries")}</label><textarea id="c-boundaries" rows="2"></textarea></div>`;
  html += `<div class="field"><label for="c-wishes">${s("ui.wishes")}</label><textarea id="c-wishes" rows="2"></textarea></div>`;
  html += `<button id="start-game-btn" class="primary" style="width:100%;padding:0.75rem">${s("ui.begin")}</button>`;
  form.innerHTML = html;

  // Build data maps per setting
  const settingMap = {};
  settings.forEach(st => { settingMap[st.id] = st; });

  function curSetting() { return settingMap[document.querySelector('input[name="setting"]:checked')?.value] || settings[0]; }

  // Path updates
  function updatePaths() {
    const st = curSetting();
    const paths = st.paths || [];
    ["c-path1","c-path2"].forEach(id => {
      $(id).innerHTML = paths.map(p => `<option value="${esc(p.id)}">${esc(p.title)}</option>`).join("");
    });
    if (paths.length > 1) $("c-path2").selectedIndex = 1;
  }

  // Truths updates
  function updateTruths() {
    const st = curSetting();
    const container = $("truths-container");
    const truths = st.truths || [];
    if (!truths.length || !st.creation_flow?.has_truths) { container.innerHTML = ""; container.classList.add("hidden"); return; }
    container.classList.remove("hidden");
    let h = `<label>${s("ui.truths")}</label>`;
    truths.forEach(t => {
      h += `<div style="margin-bottom:0.75rem"><label for="truth-${esc(t.id)}">${s("ui.truth_pick", {name: t.name})}</label>`;
      h += `<select id="truth-${esc(t.id)}" class="truth-select" data-truth-id="${esc(t.id)}" style="width:100%">`;
      t.options.forEach((o, i) => { h += `<option value="${i}" title="${esc(o.description)}">${esc(o.summary)}</option>`; });
      h += `</select></div>`;
    });
    container.innerHTML = h;
  }

  // Starting assets
  function updateAssets() {
    const st = curSetting();
    const container = $("asset-container");
    const assets = st.starting_assets || [];
    if (!assets.length) { container.innerHTML = ""; container.classList.add("hidden"); return; }
    container.classList.remove("hidden");
    let h = `<label for="c-asset">${s("ui.starting_assets")}</label><select id="c-asset" style="width:100%">`;
    h += `<option value="">— none —</option>`;
    let lastCat = "";
    assets.forEach(a => {
      if (a.category !== lastCat) { if (lastCat) h += `</optgroup>`; h += `<optgroup label="${esc(a.category)}">`; lastCat = a.category; }
      h += `<option value="${esc(a.id)}">${esc(a.title)}</option>`;
    });
    if (lastCat) h += `</optgroup>`;
    h += `</select>`;
    container.innerHTML = h;
  }

  // Name roll
  function rollName() {
    const st = curSetting();
    const tables = st.name_tables || {};
    const keys = Object.keys(tables);
    if (!keys.length) return;
    const parts = [];
    keys.slice(0, 2).forEach(k => {
      const list = tables[k];
      if (list.length) parts.push(list[Math.floor(Math.random() * list.length)]);
    });
    if (parts.length) $("c-name").value = parts.join(" ");
  }

  // Backstory roll
  function rollBackstory() {
    const st = curSetting();
    const prompts = st.backstory_prompts || [];
    if (prompts.length) $("c-backstory").value = prompts[Math.floor(Math.random() * prompts.length)];
  }

  // Setting change wires
  function onSettingChange() { updatePaths(); updateTruths(); updateAssets(); }
  document.querySelectorAll('input[name="setting"]').forEach(r => r.onchange = onSettingChange);
  onSettingChange();

  $("roll-name-btn").onclick = rollName;
  $("roll-backstory-btn").onclick = rollBackstory;

  // Stats validation
  function updateStats() {
    let t = 0;
    document.querySelectorAll(".stat-input").forEach(i => { t += parseInt(i.value) || 0; });
    $("stat-total").textContent = s("ui.stats_total", {t, target: sc.target_sum});
    $("stat-total").style.color = t === sc.target_sum ? "var(--success)" : "var(--error)";
  }
  document.querySelectorAll(".stat-input").forEach(i => i.oninput = updateStats);
  updateStats();

  // Submit
  $("start-game-btn").onclick = () => {
    const stats = {};
    let total = 0;
    document.querySelectorAll(".stat-input").forEach(i => {
      const v = parseInt(i.value) || 0;
      stats[i.dataset.stat] = v;
      total += v;
    });
    if (total !== sc.target_sum) { alert(s("ui.stats_must_total", {target: sc.target_sum})); return; }
    if (Object.values(stats).some(v => v < sc.min || v > sc.max)) { alert(s("ui.stats_range", {min: sc.min, max: sc.max})); return; }

    // Gather truths
    const truths = {};
    document.querySelectorAll(".truth-select").forEach(sel => {
      const tid = sel.dataset.truthId;
      const st = curSetting();
      const truthDef = (st.truths || []).find(t => t.id === tid);
      if (truthDef && truthDef.options[sel.value]) truths[tid] = truthDef.options[sel.value].summary;
    });

    // Gather asset
    const assets = [];
    const assetSel = $("c-asset");
    if (assetSel && assetSel.value) assets.push(assetSel.value);

    send({type: "start_game", creation_data: {
      setting_id: document.querySelector('input[name="setting"]:checked')?.value,
      player_name: $("c-name").value.trim() || currentPlayer,
      pronouns: $("c-pronouns").value,
      paths: [$("c-path1").value, $("c-path2").value],
      backstory: $("c-backstory").value.trim(),
      background_vow: $("c-vow").value.trim(),
      background_vow_rank: $("c-vow-rank").value,
      vow_subject: $("c-vow-subject").value.trim(),
      stats,
      assets,
      truths,
      wishes: $("c-wishes").value.trim(),
      content_lines: $("c-boundaries").value.trim(),
    }});
    showPhase("game");
  };
}

// ── Utilities ───────────────────────────────────────────────
function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
function raf(fn) { requestAnimationFrame(fn); }

// Screen reader announcements
const _ann = document.createElement("div");
_ann.setAttribute("aria-live", "assertive");
_ann.setAttribute("role", "status");
_ann.style.cssText = "position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden";
document.body.appendChild(_ann);
function announce(text) { _ann.textContent = ""; raf(() => { _ann.textContent = text; }); }

// ── Boot ────────────────────────────────────────────────────
connect();
</script>
</body>
</html>
