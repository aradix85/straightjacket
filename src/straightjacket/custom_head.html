<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EdgeTales">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;700;900&family=Inter:wght@300..700&display=swap" rel="stylesheet">
<style>
:root {
    --bg-primary: #121212;
    --bg-sidebar: #171717;
    --bg-surface: #2a2a2a;
    --bg-surface-light: #333;
    --accent: #D97706;
    --accent-light: #F59E0B;
    --accent-dim: rgba(217,119,6,0.15);
    --accent-dim-strong: rgba(217,119,6,0.25);
    --accent-border: rgba(217,119,6,0.38);
    --text-primary: #e5e5e5;
    --text-secondary: #a3a3a3;
    --border: #3a3a3a;
    --border-light: #444;
    --user-border: #C45C3A;
    --success: #4ade80;
    --success-dim: rgba(74,222,128,0.08);
    --error: #ef4444;
    --error-dark: #dc2626;
    --error-dim: rgba(220,38,38,0.10);
    --error-border: rgba(220,38,38,0.38);
    --health-vignette: 0;
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
    --sal: env(safe-area-inset-left, 0px);
    --sar: env(safe-area-inset-right, 0px);
}
/* --- Scrollbars: hidden by default, subtle on hover --- */
.q-drawer__content, .chat-scroll { scrollbar-width: thin; scrollbar-color: transparent transparent; overflow-y: auto; }
.q-drawer__content:hover, .chat-scroll:hover { scrollbar-color: rgba(255,255,255,0.12) transparent; }
.q-drawer__content::-webkit-scrollbar, .chat-scroll::-webkit-scrollbar { width: 5px; }
.q-drawer__content::-webkit-scrollbar-track, .chat-scroll::-webkit-scrollbar-track { background: transparent; }
.q-drawer__content::-webkit-scrollbar-thumb, .chat-scroll::-webkit-scrollbar-thumb { background: transparent; border-radius: 3px; }
.q-drawer__content:hover::-webkit-scrollbar-thumb, .chat-scroll:hover::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); }
.q-drawer__content:hover::-webkit-scrollbar-thumb:hover, .chat-scroll:hover::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }
/* --- Accessibility --- */
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border-width: 0; }
*:focus-visible { outline: 2px solid var(--accent-light) !important; outline-offset: 2px; }
.q-btn:focus-visible, .q-item:focus-visible, .q-expansion-item__toggle-icon:focus-visible { outline: 2px solid var(--accent-light) !important; outline-offset: 2px; }
/* --- Global --- */
.q-drawer { background: var(--bg-sidebar) !important; border-right: 1px solid var(--border) !important; }
.q-page { background: var(--bg-primary) !important; }
body { background: var(--bg-primary) !important; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
html, body, .q-page { max-width: 100vw; overflow-x: hidden; }
input, textarea, select, .q-field__native, .q-field__input { font-size: 16px !important; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
/* --- Narrator font modes --- */
.chat-msg.assistant { font-family: Georgia, 'Times New Roman', serif; font-size: 1rem; line-height: 1.75; }
body[data-narrator-font="sans"]      .chat-msg.assistant { font-family: system-ui, -apple-system, sans-serif !important; font-size: 1rem !important; line-height: 1.6 !important; }
body[data-narrator-font="highlight"] .chat-msg.assistant { font-family: system-ui, -apple-system, sans-serif !important; font-size: 1rem !important; line-height: 1.85 !important; }
/* --- Sidebar --- */
.q-expansion-item .q-item { padding: 8px 12px; border-radius: 8px; min-height: 44px; }
.q-expansion-item .q-item:hover { background: var(--accent-dim); }
.q-expansion-item .q-item__label { color: var(--text-primary); font-size: 0.9rem; padding-left: 1.8em; text-indent: -1.8em; }
.q-separator { background: var(--border) !important; }
/* --- Layout --- */
.chat-scroll { padding: 1rem; padding-bottom: 5rem; flex: 1; }
.choice-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.5rem; width: 100%; }
@media (min-width: 768px) { .choice-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
.choice-btn.q-btn { border: 1px solid var(--border-light) !important; color: var(--text-primary) !important; background: transparent !important; text-transform: none !important; font-weight: 400 !important; letter-spacing: normal !important; min-height: 48px; min-width: 0; overflow: hidden; transition: border-color 0.15s ease, background-color 0.15s ease !important; }
.choice-btn.q-btn .q-btn__content { color: var(--text-primary) !important; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.choice-btn.q-btn:hover { border-color: var(--accent) !important; background: var(--accent-dim) !important; }
.q-btn .q-focus-helper { display: none !important; }
/* --- Chat --- */
.chat-msg { margin-bottom: 0.25rem; padding: 0.4rem 0; color: var(--text-primary); }
.chat-msg.assistant { background: transparent; border: none; }
.chat-msg.user { background: var(--bg-surface); border-left: 3px solid var(--user-border); border-radius: 12px; padding: 0.5rem 1rem; }
.chat-msg.user.correction { border-left-color: var(--success); }
.chat-msg.recap { background: transparent; border: none; border-top: 1px solid var(--border); padding-top: 1rem; }
.correction-badge { display: inline-block; font-size: 0.72em; color: var(--text-secondary); opacity: 0.65; margin-bottom: 0.3em; letter-spacing: 0.03em; }
.chat-msg h1, .chat-msg h2, .chat-msg h3 { font-size: 1.1rem !important; font-weight: 600; margin: 0.5em 0 0.3em 0; }
.scene-marker { display: block; width: 100%; text-align: center; color: var(--text-secondary); font-size: 0.85rem; letter-spacing: 0.06em; margin: 0.75em 0; padding: 0.45em 0.5em; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); line-height: 1.5; }
/* --- NPC cards --- */
.npc-card { padding: 0.35rem 0.5rem 0.4rem; border-left: 2px solid var(--border-light); margin-bottom: 0.25rem; }
.npc-card .npc-name { font-size: 0.85rem; font-weight: 600; color: var(--text-primary); }
.npc-card .npc-meta { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.1rem; }
.npc-card .npc-desc { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem; opacity: 0.85; font-style: italic; line-height: 1.4; }
/* --- Momentum burn glow --- */
.burn-card { animation: burn-glow 2s ease-in-out infinite; }
@keyframes burn-glow { 0%,100%{box-shadow:0 0 0 0 rgba(217,119,6,0);} 50%{box-shadow:0 0 12px 3px rgba(217,119,6,0.25);} }
/* --- Stats --- */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
.stat-item { padding: 0.4rem 0.6rem; background: transparent; border-radius: 8px; text-align: center; position: relative; }
.stat-value { font-size: 1.8rem; font-weight: 700; line-height: 1.2; color: var(--text-primary); }
.stat-label { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.1rem; }
/* --- Track bars --- */
.track-bar { height: 8px; border-radius: 4px; background: var(--bg-surface-light); overflow: hidden; margin: 2px 0 8px; }
.track-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
.track-fill.health { background: linear-gradient(90deg, var(--error-dark), var(--error)); }
.track-fill.spirit { background: linear-gradient(90deg, #2563eb, #60a5fa); }
.track-fill.supply { background: linear-gradient(90deg, var(--accent), var(--accent-light)); }
.track-fill.chaos { background: linear-gradient(90deg, #737373, var(--error-dark)); }
.track-fill.progress { background: linear-gradient(90deg, var(--accent), var(--accent-light)); }
/* --- Dice --- */
.dice-simple { text-align: right; font-size: 0.8em; opacity: 0.8; margin-top: 0.5em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dice-simple.success { color: var(--success); } .dice-simple.warning { color: var(--accent-light); } .dice-simple.error { color: var(--error); }
/* --- Audio dark mode --- */
.chat-scroll audio, .chat-msg audio { filter: invert(1) hue-rotate(180deg); opacity: 0.85; width: 100%; min-height: 40px; border-radius: 8px; }
/* --- Footer/header safe areas --- */
.q-footer { padding-bottom: var(--sab) !important; }
.rpg-slim-header.q-header { background: rgba(18,18,18,0.85) !important; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); box-shadow: none !important; border-bottom: 1px solid var(--border) !important; min-height: 48px !important; padding-top: var(--sat) !important; padding-left: var(--sal) !important; padding-right: var(--sar) !important; }

/* ==========================================
   DIALOG HIGHLIGHT (EdgeTales Design mode)
   ========================================== */
body[data-narrator-font="highlight"] .chat-msg.assistant em strong,
body[data-narrator-font="highlight"] .chat-msg.assistant strong em {
    background:
        radial-gradient(ellipse 60% 45% at 8% 30%, rgba(255,255,255,0.10) 0%, transparent 100%),
        linear-gradient(to right, hsla(0,52%,20%,0.04), hsla(0,52%,28%,0.40) 4%, hsla(0,52%,20%,0.28) 40%, hsla(0,52%,28%,0.22) 100%);
    border-radius: 0.7em 0.3em;
    padding: 0.00em 0.62em 0.0em;
    margin-left: -0.47em;
    margin-right: -0.40em;
    color: hsl(0, 32%, 86%);
    box-decoration-break: clone;
    -webkit-box-decoration-break: clone;
    text-shadow: 0 0 20px hsla(0,52%,28%,0.47);
    position: relative;
    top: 0em;
    font-weight: 400;
}
/* --- Chaos interrupt flash (all modes) --- */
.chat-msg.assistant.et-chaos { animation: chaos-interrupt-pulse 3.5s ease-out forwards; border-radius: 4px; }
@keyframes chaos-interrupt-pulse {
    0%   { box-shadow: 0 0  0px 0px rgba(220,38,38,0.00); background: rgba(110,8,8,0.00); }
    6%   { box-shadow: 0 0 28px 8px rgba(220,38,38,0.42); background: rgba(110,8,8,0.18); }
    18%  { box-shadow: 0 0 14px 3px rgba(220,38,38,0.22); background: rgba(110,8,8,0.10); }
    100% { box-shadow: 0 0  0px 0px rgba(220,38,38,0.00); background: transparent; }
}
/* --- Chaos text breathing (chaos >= 8, Design mode) --- */
body[data-narrator-font="highlight"][data-chaos-high] .chat-msg.assistant { animation: chaos-text-breathe 5s ease-in-out infinite; }
@keyframes chaos-text-breathe {
    0%   { opacity: 1.0;  text-shadow: none; }
    10%  { opacity: 0.72; text-shadow: 0 0 10px rgba(180,20,20,0.32); }
    20%  { opacity: 0.94; text-shadow: 0 0 3px  rgba(180,20,20,0.10); }
    30%  { opacity: 0.65; text-shadow: 0 0 15px rgba(180,20,20,0.44); }
    44%  { opacity: 1.0;  text-shadow: none; }
    100% { opacity: 1.0;  text-shadow: none; }
}
/* --- Chaos ambient (chaos >= 7) --- */
body[data-chaos-high]::after {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(120,10,10,0.18) 100%);
    animation: chaos-fade 5s ease-in-out infinite; z-index: 9001;
}
@keyframes chaos-fade { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
/* --- Health vignette (Design mode) --- */
body[data-narrator-font="highlight"]::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at 50% 48%, transparent 22%, rgba(0,0,0,0.85) 100%);
    opacity: var(--health-vignette); transition: opacity 4s ease; z-index: 9000;
}

/* ==========================================
   ENTITY HIGHLIGHTING (Design mode)
   ========================================== */
body[data-narrator-font="highlight"] .chat-msg.assistant .et-npc-warm    { color: hsl(152, 32%, 64%); }
body[data-narrator-font="highlight"] .chat-msg.assistant .et-npc-hostile  { color: hsl(0, 38%, 66%); }
body[data-narrator-font="highlight"] .chat-msg.assistant .et-npc-wary    { color: hsl(36, 45%, 64%); }
body[data-narrator-font="highlight"] .chat-msg.assistant .et-player      { color: var(--accent-light); }
body[data-narrator-font="highlight"] .chat-msg.assistant em strong .et-npc-warm,
body[data-narrator-font="highlight"] .chat-msg.assistant strong em .et-npc-warm    { color: hsl(152, 38%, 72%); }
body[data-narrator-font="highlight"] .chat-msg.assistant em strong .et-npc-hostile,
body[data-narrator-font="highlight"] .chat-msg.assistant strong em .et-npc-hostile  { color: hsl(0, 42%, 72%); }
body[data-narrator-font="highlight"] .chat-msg.assistant em strong .et-npc-wary,
body[data-narrator-font="highlight"] .chat-msg.assistant strong em .et-npc-wary    { color: hsl(36, 50%, 72%); }
body[data-narrator-font="highlight"] .chat-msg.assistant em strong .et-player,
body[data-narrator-font="highlight"] .chat-msg.assistant strong em .et-player      { color: var(--accent-light); }

/* ==========================================
   GAME OVER OVERLAY
   ========================================== */
@keyframes _go_appear   { to { opacity: 1; } }
@keyframes _go_line     { to { width: 180px; opacity: 0.5; } }
@keyframes _go_fadeout  { 0%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
._go_overlay { position: fixed; inset: 0; z-index: 9990; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; animation: _go_fadeout 1s ease-in 4.2s forwards; pointer-events: none; }
._go_skull { font-size: 3.5rem; opacity: 0; display: block; margin-bottom: 1.2rem; filter: drop-shadow(0 0 28px rgba(220,38,38,0.5)); animation: _go_appear 0.8s ease-out 0.3s forwards; }
._go_title { font-family: 'Cinzel', serif; font-size: clamp(2.2rem, 8vw, 4.5rem); font-weight: 900; letter-spacing: 0.2em; color: #fff; opacity: 0; line-height: 1.1; text-shadow: 0 0 60px rgba(220,38,38,0.35); animation: _go_appear 1s ease-out 0.9s forwards; }
._go_sub { font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 300; letter-spacing: 0.3em; color: #444; text-transform: uppercase; opacity: 0; margin-top: 0.6rem; animation: _go_appear 1s ease-out 1.6s forwards; }
._go_line { width: 0; height: 1px; background: var(--error-dark); margin: 1.8rem auto; opacity: 0; animation: _go_line 1s ease-out 2.1s forwards; }
._go_flavor { font-family: Georgia, serif; font-style: italic; color: #777; font-size: 0.92rem; max-width: 360px; line-height: 1.75; opacity: 0; animation: _go_appear 1s ease-out 2.5s forwards; }

/* --- Chaos letter pulse (chaos >= 8, Design mode) --- */
.cl-pulse { display: inline-block; will-change: transform; }
.cl-full { animation: cl-beat-full var(--cl-dur, 3.8s) ease-in-out var(--cl-delay, 0s) infinite; }
.cl-half { animation: cl-beat-half var(--cl-dur, 3.8s) ease-in-out var(--cl-delay, 0s) infinite; }
@keyframes cl-beat-full { 0%,100% { transform: scale(1.0); } 50% { transform: scale(1.45); } }
@keyframes cl-beat-half { 0%,100% { transform: scale(1.0); } 50% { transform: scale(1.22); } }

/* ==========================================
   RESPONSIVE
   ========================================== */
@media (max-width: 768px) {
    .chat-msg.user { padding: 0.5rem 0.75rem; }
    .stat-value { font-size: 1.4rem; } .stat-label { font-size: 0.75rem; } .stat-item { padding: 0.35rem 0.5rem; }
    .chat-scroll { padding: 0.5rem; padding-bottom: 5rem; }
    .rpg-input-bar { padding-left: 0.5rem !important; padding-right: 0.5rem !important; }
    .q-drawer__content { padding: 0.5rem; }
    .q-expansion-item .q-item { min-height: 48px; display: flex; align-items: center; }
    .q-page > .q-card, .chat-scroll .q-card { margin: 0 !important; }
    .q-btn { min-height: 44px; }
}
@media (max-width: 400px) {
    .stat-value { font-size: 1.2rem; } .stat-grid { gap: 0.35rem; } .choice-grid { gap: 0.35rem; }
    .choice-btn.q-btn { font-size: 0.8rem; min-height: 44px; padding: 0.4rem 0.5rem; }
    .chat-msg.user { padding: 0.4rem 0.6rem; border-radius: 8px; }
    .chat-scroll { padding: 0.35rem; padding-bottom: 5rem; }
}
</style>

<script>
/* --- Accessibility: Quasar toasts announce to screen readers --- */
(function(){
    var o = new MutationObserver(function(){
        document.querySelectorAll('.q-notifications__list:not([aria-live])').forEach(function(el){
            el.setAttribute('role','log'); el.setAttribute('aria-live','assertive'); el.setAttribute('aria-atomic','false');
        });
    });
    o.observe(document.documentElement, {childList:true, subtree:true});
})();

/* --- Entity Highlighting ---
   Called from Python via ui.run_javascript() after markdown render.
   scopeNew=true: only process .et-new elements (live turns). */
function _etHighlight(data, scopeNew) {
    if (!data || !data.entities || data.entities.length === 0) return;
    var sel = scopeNew ? '.chat-msg.assistant.et-new' : '.chat-msg.assistant';
    document.querySelectorAll(sel).forEach(function(msg) {
        if (msg.dataset.etDone) return;
        msg.classList.remove('et-new');
        var walker = document.createTreeWalker(msg, NodeFilter.SHOW_TEXT);
        var nodes = [];
        while (walker.nextNode()) nodes.push(walker.currentNode);
        nodes.forEach(function(node) {
            if (!node.textContent.trim()) return;
            if (node.parentElement && node.parentElement.classList.contains('sr-only')) return;
            if (node.parentElement && node.parentElement.className &&
                node.parentElement.className.indexOf('et-') === 0) return;
            var html = node.textContent.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            var changed = false;
            for (var i = 0; i < data.entities.length; i++) {
                var ent = data.entities[i];
                var escaped = ent.name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                var re = new RegExp('\\b' + escaped + '\\b', 'g');
                var escName = ent.name.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                var newHtml = html.replace(re, '<span class="' + ent.cls + '">' + escName + '</span>');
                if (newHtml !== html) { html = newHtml; changed = true; }
            }
            if (changed) {
                var frag = document.createDocumentFragment();
                var temp = document.createElement('span');
                temp.innerHTML = html;
                while (temp.firstChild) frag.appendChild(temp.firstChild);
                node.parentNode.replaceChild(frag, node);
            }
        });
        msg.dataset.etDone = '1';
    });
}

/* --- Chaos Letter Pulse ---
   enable=true: inject pulsing spans. enable=false: remove and normalize. */
var _etLPActive = false;
function _etLetterPulse(enable) {
    if (enable && _etLPActive) return;
    if (!enable && !_etLPActive) return;
    if (!enable) {
        _etLPActive = false;
        var parents = [];
        document.querySelectorAll('[data-cl-pulse]').forEach(function(sp) {
            var p = sp.parentNode;
            sp.replaceWith(document.createTextNode(sp.textContent));
            if (p && parents.indexOf(p) === -1) parents.push(p);
        });
        parents.forEach(function(p) { try { p.normalize(); } catch(e){} });
        return;
    }
    _etLPActive = true;
    function sr(seed) { var x = Math.sin(seed+1)*10000; return x - Math.floor(x); }
    document.querySelectorAll('.chat-msg.assistant').forEach(function(msg, mi) {
        var walker = document.createTreeWalker(msg, NodeFilter.SHOW_TEXT);
        var nodes = []; while (walker.nextNode()) nodes.push(walker.currentNode);
        nodes.forEach(function(node, ni) {
            var txt = node.textContent;
            if (!txt.trim()) return;
            if (node.parentElement && (node.parentElement.classList.contains('sr-only') ||
                node.parentElement.dataset.clPulse)) return;
            var frag = document.createDocumentFragment();
            var seed = mi * 997 + ni * 113;
            for (var i = 0; i < txt.length; i++) {
                var ch = txt[i];
                if (/[a-zA-Z\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df]/.test(ch) && sr(seed+i) < 0.14) {
                    var sp = document.createElement('span');
                    sp.className = 'cl-pulse ' + (sr(seed+i+0.5) < 0.45 ? 'cl-full' : 'cl-half');
                    sp.style.setProperty('--cl-dur',   (3.0 + sr(seed+i+0.3)*2.8).toFixed(2)+'s');
                    sp.style.setProperty('--cl-delay', (sr(seed+i+0.7)*7.0).toFixed(2)+'s');
                    sp.textContent = ch;
                    sp.dataset.clPulse = '1';
                    frag.appendChild(sp);
                } else {
                    frag.appendChild(document.createTextNode(ch));
                }
            }
            node.parentNode.replaceChild(frag, node);
        });
    });
}
</script>
