# Straightjacket emotion system
# Maps emotional_weight labels to importance scores (1-10).
# Used by the NPC memory system to decide what matters.
# 9-tier scale matching upstream for memory retrieval granularity.

# ── Importance tiers ──────────────────────────────────────────
# Scale: 2=baseline, 3=mild, 4=moderate, 5=significant, 6=strong,
#        7=intense, 8=peak, 9=devastating, 10=character-defining

