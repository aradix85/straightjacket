# ── Information gate levels (step 6) ─────────────────────────
# Engine computes per-NPC gate level (0-4) controlling what enters
# the narrator prompt. Higher gate = more information visible.
# Gate 0: name + description only (stranger)
# Gate 1: + stance + constraint (surface contact)
# Gate 2: + agenda + recent memories (some interaction)
# Gate 3: + instinct + arc + all memories (trust building)
# Gate 4: + secrets (fully open)
information_gate:
  # Points earned per factor. Gate = clamp(total_points, 0, 4).
  points:
    scenes_known_1: 0       # 0 scenes since introduction
    scenes_known_2_3: 1     # 1+ scenes
    scenes_known_4_plus: 2  # 4+ scenes
    gather_success: 1       # per successful gather_information targeting this NPC
    bond_1: 0               # bond 0-1
    bond_2_3: 1             # bond 2-3
    bond_4_plus: 2          # bond 4+
  # Stance caps: maximum gate level per stance category.
  # Prevents hostile/evasive NPCs from revealing too much.
  stance_caps:
    aggressive: 1
    hostile: 1
    stonewalling: 0
    obstructive: 1
    brutal: 1
    confrontational: 1
    misleading: 1
    sabotaging: 1
    conflicted_violent: 2
    bitter: 2
    grudging: 2
    reluctant_hostile: 2
    defensive: 1
    guarded: 2
    evasive: 1
    wary: 2
    cautious_ally: 2
    testing: 2
    conditional: 2
    transactional: 2
    protective_wary: 3
    frank: 3
    forthcoming: 3
    cooperative_guarded: 3
    # Neutral and above: no cap (defaults to 4)
  default_cap: 4

# ── Enums ─────────────────────────────────────────────────────
# Single source of truth for all enum-like values used across the engine.
# Python reads these at runtime; schemas are built from them dynamically.
enums:
  time_phases:
    - early_morning
    - morning
    - midday
    - afternoon
    - evening
    - late_evening
    - night
    - deep_night
  npc_statuses:
    - active
    - background
    - deceased
    - lore
  dispositions:
    - hostile
    - distrustful
    - neutral
    - friendly
    - loyal
  memory_types:
    - observation
    - reflection
  clock_types:
    - threat
    - scheme
    - progress
  thread_types:
    - vow
    - goal
    - tension
    - subplot
  story_structures:
    - 3act
    - kishotenketsu
  positions:
    - controlled
    - risky
    - desperate

# ── Memory retrieval weights ─────────────────────────────────
memory_retrieval_weights:
  recency: 0.40
  importance: 0.35
  relevance: 0.25

# ── Opening scene defaults ───────────────────────────────────
opening:
  time_of_day: morning
  clock_segments: 6
  clock_filled: 1
  clock_fallback_name: "Looming threat"
  clock_trigger_template: "Threat escalates beyond {player}'s control"

# ── Move routing ─────────────────────────────────────────────
# Maps moves to resource tracks for miss damage and recovery healing.
# These replace hardcoded Python dicts with config-driven lookups.
move_routing:
  miss_endure:
    suffer/endure_harm: health
    suffer/endure_stress: spirit
  recovery:
    suffer/endure_harm: {track: health, cap: health_max}
    suffer/endure_stress: {track: spirit, cap: spirit_max}
    recover/resupply: {track: supply, cap: supply_max}

# ── Architect constraints ────────────────────────────────────
architect:
  forbidden_moods:
    - surreal
    - disorienting
    - revelatory
    - haunted
    - spectral
    - ethereal
    - otherworldly
    - eldritch
    - supernatural
    - dreamlike
    - hallucinatory
    - phantasmagoric
    - uncanny

# ── Fate system (Mythic GME 2e) ──────────────────────────────
# Probabilistic yes/no questions about the fiction.
# Data in data/mythic_gme_2e.json. Config here controls method and likelihood.
fate:
  default_method: fate_chart        # fate_chart or fate_check
  likelihood_rules:
    # NPC disposition → score modifier
    disposition_scores:
      hostile: -3
      distrustful: -2
      neutral: 0
      friendly: 2
      loyal: 3
    # Chaos factor thresholds
    chaos_thresholds:
      high: 7
      low: 3
    chaos_scores:
      high: -1                      # High chaos = less favorable
      low: 1                        # Low chaos = more favorable
    # Resource pressure
    resource_critical_below: 2
    resource_scores:
      critical: -1
    # Score → odds mapping (checked in order, first match wins)
    score_to_odds:
      - {min_score: 5, odds: certain}
      - {min_score: 4, odds: nearly_certain}
      - {min_score: 3, odds: very_likely}
      - {min_score: 1, odds: likely}
      - {min_score: -1, odds: fifty_fifty}
      - {min_score: -3, odds: unlikely}
      - {min_score: -4, odds: very_unlikely}
      - {min_score: -5, odds: nearly_impossible}
      - {min_score: -99, odds: impossible}

# ── Track-creating moves (step 8) ────────────────────────────
# Moves that create a new progress track. Brain must supply track_name.
# track_category maps to ProgressTrack.track_type.
track_creating_moves:
  quest/swear_an_iron_vow: vow
  connection/make_a_connection: connection
  combat/enter_the_fray: combat
  exploration/undertake_an_expedition: expedition
  scene_challenge/begin_the_scene: scene_challenge

# Moves that also mark progress on an active scene_challenge track.
# When a scene challenge is active and the player uses one of these adventure moves,
# the engine marks progress on the scene_challenge track in addition to normal outcome.
scene_challenge_progress_moves:
  - adventure/face_danger
  - adventure/secure_an_advantage

# ── Move outcomes (step 7b) ──────────────────────────────────
# Data-driven mechanical effects per move per result.
# Simple moves: list of effect strings.
# Complex moves: handler name + params dict.
# See mechanics/move_outcome.py for effect vocabulary.

move_outcomes:

  # ── Adventure moves ──────────────────────────────────────────

  adventure/face_danger:
    strong_hit: [momentum +1]
    weak_hit: [suffer_move -1]
    miss: [pay_the_price]

  adventure/secure_an_advantage:
    strong_hit: [momentum +2, next_move_bonus +1]
    weak_hit: [momentum +2]           # resolved choice: momentum over next_move_bonus
    miss: [pay_the_price]

  adventure/gather_information:
    strong_hit: [momentum +2]
    weak_hit: [momentum +1]
    miss: [pay_the_price]

  adventure/compel:
    strong_hit: [momentum +1, bond +1]
    weak_hit: [momentum +1]
    miss: [pay_the_price]

  adventure/check_your_gear:
    strong_hit: [momentum +1]
    weak_hit: [supply -1]             # resolved choice: supply loss over momentum loss
    miss: [pay_the_price]

  # ── Combat moves ─────────────────────────────────────────────

  combat/enter_the_fray:
    strong_hit: [momentum +2, position in_control]
    weak_hit: [momentum +2]           # resolved choice: momentum over position
    miss: [position bad_spot]

  combat/strike:
    strong_hit: [mark_progress 2, position in_control]
    weak_hit: [mark_progress 2, position bad_spot]
    miss: [pay_the_price, position bad_spot]

  combat/clash:
    strong_hit: [mark_progress 2, position in_control]
    weak_hit: [mark_progress 1, pay_the_price, position bad_spot]
    miss: [pay_the_price, position bad_spot]

  combat/gain_ground:
    strong_hit: [mark_progress 1, momentum +2]   # resolved choice: progress + momentum
    weak_hit: [mark_progress 1]                   # resolved choice: progress
    miss: [pay_the_price, position bad_spot]

  combat/react_under_fire:
    strong_hit: [momentum +1, position in_control]
    weak_hit: [suffer_move -1, position bad_spot]
    miss: [pay_the_price, position bad_spot]

  combat/battle:
    strong_hit: [momentum +2]
    weak_hit: [pay_the_price]
    miss: [pay_the_price]

  combat/take_decisive_action:
    strong_hit: [momentum +1, position in_control]
    weak_hit: [pay_the_price, position bad_spot]
    miss: [pay_the_price]

  # ── Quest moves ──────────────────────────────────────────────

  quest/swear_an_iron_vow:
    strong_hit: [momentum +2]
    weak_hit: [momentum +1]
    miss: [narrative]

  quest/fulfill_your_vow:
    strong_hit: [legacy_reward quests]
    weak_hit: [legacy_reward quests]   # full reward if player swears follow-up vow
    miss: [narrative]                  # player chooses: forsake or recommit

  # ── Connection moves ─────────────────────────────────────────

  connection/make_a_connection:
    strong_hit: [momentum +1, bond +1, disposition_shift]
    weak_hit: [momentum +1, bond +1]
    miss: [pay_the_price]

  connection/develop_your_relationship:
    strong_hit: [legacy_reward bonds]  # 2 ticks on bonds legacy
    weak_hit: [momentum +2]
    miss: [narrative]

  connection/test_your_relationship:
    strong_hit: [bond +1, disposition_shift]  # triggers Develop Your Relationship
    weak_hit: [bond +1]                       # triggers Develop Your Relationship + complication
    miss: [pay_the_price]

  connection/forge_a_bond:
    strong_hit: [legacy_reward bonds]
    weak_hit: [legacy_reward bonds]    # conditional on fulfilling request
    miss: [narrative]

  # ── Exploration moves ────────────────────────────────────────

  exploration/undertake_an_expedition:
    strong_hit: [mark_progress 1]
    weak_hit: [mark_progress 1, suffer_move -2]  # resolved choice: suffer en route
    miss: [pay_the_price]

  exploration/explore_a_waypoint:
    strong_hit: [momentum +2]          # resolved choice: opportunity over progress
    weak_hit: [momentum +1]
    miss: [pay_the_price]

  exploration/set_a_course:
    strong_hit: [momentum +1]
    weak_hit: [suffer_move -2]         # resolved choice: suffer costs en route
    miss: [pay_the_price]

  exploration/finish_an_expedition:
    strong_hit: [legacy_reward discoveries]
    weak_hit: [narrative]              # legacy reward at reduced rank
    miss: [pay_the_price]              # resolved choice: abandon

  # ── Recover moves ────────────────────────────────────────────

  recover/heal:
    handler: recovery
    params:
      track: health
      full_amount: 3
      impact_amount: 2
      blocking_impact: wounded
      weak_hit_cost_type: momentum
      weak_hit_cost: -2

  recover/hearten:
    handler: recovery
    params:
      track: spirit
      full_amount: 2
      impact_amount: 1
      blocking_impact: shaken
      weak_hit_cost_type: momentum
      weak_hit_cost: -1

  recover/resupply:
    strong_hit: [supply +2]            # resolved choice: supply over specific item
    weak_hit: [supply +2]              # same effect, with narrative complication
    miss: [pay_the_price]

  recover/repair:
    # Repair uses a point system that depends on situation (at facility / in field / under fire).
    # Engine cannot determine situation automatically — treat as narrative with resource effect.
    strong_hit: [narrative]
    weak_hit: [narrative]
    miss: [pay_the_price]

  recover/sojourn:
    # Sojourn triggers other recovery moves (Heal, Hearten, Repair, Resupply) as auto-strong-hits.
    # For now, apply a broad recovery effect.
    strong_hit: [health +2, spirit +1]   # approximation of 2 recovery sub-moves
    weak_hit: [health +1]                # approximation of 1 recovery sub-move
    miss: [pay_the_price]

  # ── Suffer moves ─────────────────────────────────────────────

  suffer/endure_harm:
    handler: suffer
    params:
      track: health
      recovery: 1
      miss_extra_track: -1
      miss_extra_momentum: -2
      impact_pair: [wounded, permanently_harmed]
      blocking_impact: wounded

  suffer/endure_stress:
    handler: suffer
    params:
      track: spirit
      recovery: 1
      miss_extra_track: -1
      miss_extra_momentum: -2
      impact_pair: [shaken, traumatized]
      blocking_impact: shaken

  suffer/withstand_damage:
    handler: suffer
    params:
      track: integrity
      recovery: 1
      miss_extra_track: -1
      miss_extra_momentum: -2
      impact_pair: [battered, cursed]
      blocking_impact: battered

  suffer/companion_takes_a_hit:
    handler: suffer
    params:
      track: companion_health
      recovery: 1
      miss_extra_track: -1
      miss_extra_momentum: -2
      impact_pair: []
      blocking_impact: ""

  suffer/lose_momentum:
    strong_hit: [narrative]
    weak_hit: [narrative]
    miss: [narrative]

  suffer/sacrifice_resources:
    strong_hit: [narrative]
    weak_hit: [narrative]
    miss: [narrative]

  # ── Threshold moves ──────────────────────────────────────────

  threshold/face_death:
    handler: threshold
    params:
      impact: doomed
      game_over_text: "you are dead"

  threshold/face_desolation:
    handler: threshold
    params:
      impact: tormented
      game_over_text: "you succumb to despair and are lost"

  # ── Scene challenge moves ────────────────────────────────────

  scene_challenge/face_danger:
    strong_hit: [mark_progress 1]
    weak_hit: [mark_progress 1, fill_clock 1]
    miss: [fill_clock 1, pay_the_price]

  scene_challenge/secure_an_advantage:
    strong_hit: [momentum +2, next_move_bonus +1]
    weak_hit: [momentum +2]           # resolved choice: momentum over bonus
    miss: [fill_clock 1, pay_the_price]

  scene_challenge/finish_the_scene:
    strong_hit: [narrative]
    weak_hit: [pay_the_price]
    miss: [pay_the_price]


  # ── Classic-specific moves ───────────────────────────────────
  # Classic uses different category names: relationship/ instead of connection/

  adventure/heal:
    handler: recovery
    params:
      track: health
      full_amount: 3
      impact_amount: 2
      blocking_impact: wounded
      weak_hit_cost_type: supply
      weak_hit_cost: -1

  adventure/make_camp:
    # Resolved choice: recuperate + focus
    strong_hit: [health +1, momentum +1]
    weak_hit: [health +1]
    miss: [pay_the_price]

  adventure/reach_your_destination:
    # Progress roll for journeys (Classic equivalent of Finish an Expedition)
    strong_hit: [momentum +1]
    weak_hit: [narrative]
    miss: [pay_the_price]

  adventure/resupply:
    strong_hit: [supply +2]
    weak_hit: [supply +2, momentum -2]   # take supply but lose momentum
    miss: [pay_the_price]

  adventure/undertake_a_journey:
    strong_hit: [mark_progress 1]
    weak_hit: [mark_progress 1, supply -1]
    miss: [pay_the_price]

  combat/end_the_fight:
    # Progress roll for combat (Classic equivalent of Take Decisive Action)
    strong_hit: [narrative]
    weak_hit: [pay_the_price]
    miss: [pay_the_price]

  relationship/compel:
    strong_hit: [momentum +1, bond +1]
    weak_hit: [momentum +1]
    miss: [pay_the_price]

  relationship/draw_the_circle:
    strong_hit: [momentum +1]
    weak_hit: [momentum +1]
    miss: [pay_the_price]

  relationship/forge_a_bond:
    strong_hit: [bond +1]
    weak_hit: [bond +1]                  # conditional on fulfilling request
    miss: [pay_the_price]

  relationship/sojourn:
    # Resolved choice: recuperate + relax
    strong_hit: [health +1, spirit +1]
    weak_hit: [health +1]
    miss: [pay_the_price]

  relationship/test_your_bond:
    strong_hit: [spirit +1]              # resolved choice: spirit over momentum
    weak_hit: [narrative]
    miss: [pay_the_price]

  suffer/companion_endure_harm:
    handler: suffer
    params:
      track: companion_health
      recovery: 1
      miss_extra_track: -1
      miss_extra_momentum: -1
      impact_pair: []
      blocking_impact: ""

  suffer/face_death:
    handler: threshold
    params:
      impact: doomed
      game_over_text: "you are dead"

  suffer/face_desolation:
    handler: threshold
    params:
      impact: tormented
      game_over_text: "you succumb to despair and are lost"

  # ── Delve-specific moves ─────────────────────────────────────

  delve/check_your_gear:
    strong_hit: [momentum +1]
    weak_hit: [momentum +1, supply -1]
    miss: [pay_the_price]

  delve/delve_the_depths:
    strong_hit: [mark_progress 1]
    weak_hit: [narrative]                # roll on table per stat (narrator constraint)
    miss: [narrative]                    # Reveal a Danger (narrator constraint)

  delve/escape_the_depths:
    strong_hit: [momentum +1]
    weak_hit: [narrative]                # resolved choice: one cost
    miss: [narrative]                    # Reveal a Danger

  delve/locate_your_objective:
    # Progress roll for delve sites
    strong_hit: [momentum +1]
    weak_hit: [narrative]
    miss: [pay_the_price]
