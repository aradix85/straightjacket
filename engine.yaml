      combat: {stance: "sworn_blade", constraint: "Fights with absolute commitment."}
      social: {stance: "devoted", constraint: "Speaks with weight. Every word means something."}
      gather_information: {stance: "trusted_counsel", constraint: "Shares analysis, not just facts."}
