# Straightjacket engine mechanics
# Game rules, NPC limits, pacing, damage tables.
# Edit here to change how the game plays — no code changes needed.

# ── NPC system ────────────────────────────────────────────────
npc:
  max_active: 12              # Soft limit; excess NPCs get retired
  max_memory_entries: 25      # Per NPC (total: observations + reflections)
  max_observations: 15        # Max observation memories per NPC
  max_reflections: 8          # Max reflection memories per NPC
  activation_threshold: 0.7   # Minimum TF-IDF score for full context in prompt
  mention_threshold: 0.3      # Minimum score for name-only mention
  max_activated: 3            # Max NPCs with full context per turn
  reflection_threshold: 30    # Importance accumulator threshold for reflection
  memory_recency_decay: 0.92  # Exponential decay factor for memory recency
  reflection_importance: 8    # Importance score assigned to Director reflections
  death_corroboration_min_importance: 9  # Min importance for death corroboration voting
  seed_importance_floor: 3    # Floor for auto-seeded NPC memories
  reflection_recency_floor: 0.6  # Min recency score for reflection memories
  about_npc_relevance_boost: 0.6  # Relevance boost when memory.about_npc matches present NPC
  consolidation_recency_ratio: 0.6  # Fraction of observation budget reserved for recent memories
  monologue_max_chars: 200    # Max chars per NPC speech block before validator flags it
  description_max_chars: 200  # Max chars for Director-updated NPC descriptions
  arc_max_chars: 300          # Max chars for Director-updated NPC arcs
  # Memory counts per information gate level (gate 0-4)
  gate_memory_counts: {0: 0, 1: 0, 2: 3, 3: 5, 4: 5}
  activated_memory_count: 2   # Memories shown for activated (non-target) NPCs

# ── Chaos factor ──────────────────────────────────────────────
chaos:
  min: 1
  max: 9
  start: 5
  interrupt_types:
    - npc_unexpected
    - threat_escalation
    - twist
    - discovery
    - environment_shift
    - remote_event
    - positive_windfall
    - callback
    - dilemma
    - ticking_clock

# ── Pacing ────────────────────────────────────────────────────
pacing:
  director_interval: 3        # Call director every N scenes (when no trigger)
  max_narration_history: 3    # Recent narrations kept for prompt context
  max_narration_chars: 1500   # Max characters per narration in history entries
  max_session_log: 50         # Scene log entries kept
  window_size: 5              # Pacing analysis window
  intense_threshold: 3        # Consecutive intense scenes before breather hint
  calm_threshold: 2           # Consecutive calm scenes before action hint
  autonomous_clock_tick_chance: 0.20  # Per-scene chance each threat clock ticks
  weak_hit_clock_tick_chance: 0.50   # Chance threat clock ticks on WEAK_HIT at risky position
  fired_clock_keep_scenes: 3  # Keep fired clocks for this many scenes before purging
  npc_agency_interval: 5     # NPC-owned clocks advance every N scenes

# ── Story structure ───────────────────────────────────────────
story:
  kishotenketsu_probability:
    melancholic: 0.70
    cozy: 0.70
    romantic: 0.70
    cheerful_funny: 0.70
    slice_of_life_90s: 0.70
    fairy_tale: 0.70
    tragicomic: 0.40
    serious_balanced: 0.40
    grounded_drama: 0.40
    absurd_grotesque: 0.40
    dark_gritty: 0.15
    epic_heroic: 0.15
    slow_burn_horror: 0.15
    tarantino: 0.15
    pulp: 0.15
    slapstick: 0.15
  kishotenketsu_default: 0.50

# ── Character stats ───────────────────────────────────────────
stats:
  target_sum: 9               # Character stats must total this (3+2+2+1+1)
  min: 0                      # Minimum per stat
  max: 3                      # Maximum per stat
  names:                      # Stats the Brain can assign to a move
    - edge
    - heart
    - iron
    - shadow
    - wits
    - none
  # Valid stat distributions for character creation.
  # Client should offer only these; engine validates.
  valid_arrays:
    - [3, 2, 2, 1, 1]        # Starforged / Classic default

# ── Character creation ────────────────────────────────────────
creation:
  max_paths: 2                # Paths chosen at creation
  max_starting_assets: 1      # Additional non-path assets at creation
  starting_asset_categories:  # Asset categories available at creation
    - companion
    - module
    - command_vehicle
  background_vow_default_rank: extreme  # Default rank for background vow
  # Chaos factor adjustment based on vow keywords.
  # Engine matches vow text against these patterns (case-insensitive).
  # First match wins. No match = no adjustment.
  chaos_vow_modifiers:
    desperate: [survive, defend, escape, siege, flee, hunted, destroy]
    tense: [find, hunt, track, investigate, uncover, expose, avenge]
    calm: [explore, map, chart, discover, trade, build, settle]
  chaos_modifier_values:
    desperate: 2              # chaos_start + 2
    tense: 1                  # chaos_start + 1
    calm: -1                  # chaos_start - 1
  # Truths that imply a starting tension thread.
  # Keys are truth option summaries (substring match, case-insensitive).
  # Values are thread names seeded at creation.
  truth_threads:
    "scattered and isolated": "Isolation threatens supply lines"
    "resources are scarce": "Scarcity drives conflict"
    "war ravages": "War disrupts all plans"
    "AI is feared": "Distrust of thinking machines"
    "iron vows are sacred": "Your word binds you absolutely"
    "magic is rare": "The old rituals carry a price"
    "cursed waters": "The sea itself is hostile"

# ── Resource tracks ───────────────────────────────────────────
# Caps and starting values for health, spirit, supply.
resources:
  health_max: 5
  spirit_max: 5
  supply_max: 5
  health_start: 5
  spirit_start: 5
  supply_start: 5

# ── Momentum ──────────────────────────────────────────────────
momentum:
  floor: -6                   # Lowest momentum can go
  max: 10                     # Highest momentum can go
  start: 2                    # Starting momentum (also reset value per chapter)
  gain:
    weak_hit: 1
    strong_hit:
      standard: 2
      great: 3
  loss:
    risky: 2
    desperate: 3

# ── NPC bonds ─────────────────────────────────────────────────
bonds:
  max: 4                      # Default bond_max for new NPCs
  start: 0                    # Starting bond value

# ── NPC activation scoring ───────────────────────────────────
# Weights for the TF-IDF activation system that decides which NPCs
# get full context in the narrator prompt.
activation_scores:
  target: 1.0                 # Brain-identified target NPC
  name_match: 0.8             # Full name found in scan text
  name_part: 0.6              # Name part (3+ chars) found
  alias_match: 0.7            # Alias found in scan text
  location_match: 0.3         # NPC description mentions current location
  recent_interaction: 0.2     # NPC had interaction within last 2 scenes
  max_recursive: 1            # Max NPCs activated via secret/agenda references

# ── Damage tables ─────────────────────────────────────────────
# Position-based damage per move category on MISS.
# "controlled", "risky", "desperate" = position levels.
damage:
  miss:
    endure:                   # endure_harm / endure_stress
      controlled: 1
      risky: 1
      desperate: 2
    combat:                   # clash / strike
      controlled: 1
      risky: 2
      desperate: 3
    social:
      spirit:                 # compel / make_connection / test_bond
        controlled: 1
        risky: 1
        desperate: 2
      bond: 1                 # bond loss on social miss (flat)
    other:
      supply: 1               # supply loss on generic miss (flat)
      health:                 # additional health loss on generic miss
        controlled: 0
        risky: 1
        desperate: 2
    clock_ticks:              # threat clock advancement on miss
      controlled: 0
      risky: 1
      desperate: 2

# ── Recovery (WEAK_HIT / STRONG_HIT on recovery moves) ───────
recovery:
  weak_hit: 1                 # heal/restore amount on weak hit
  strong_hit:
    standard: 1
    great: 2

# ── Location tracking ────────────────────────────────────────
location:
  history_size: 5             # How many previous locations to keep

# ── Narrative direction ──────────────────────────────────────
# Maps game state to writing instructions for the narrator.
# Thresholds determine intensity level; result_map sets tempo and perspective.
narrative_direction:
  intensity:
    critical_below: 1         # health OR spirit at this = critical
    high_below: 3             # health OR spirit below this = high
    moderate_below: 4         # health OR spirit below this = moderate
    # Everything else = low
  result_map:
    MISS:
      tempo: slow
      perspective: sensory_loss
    WEAK_HIT:
      tempo: moderate
      perspective: action_detail
    STRONG_HIT:
      tempo: brisk
      perspective: action_detail
    dialog:
      tempo: measured
      perspective: dialogue_rhythm
    _default:
      tempo: moderate
      perspective: action_detail

# ── Move categories ──────────────────────────────────────────
# Which moves use which damage table in apply_consequences.
# Add a new move here to route it to the correct damage logic.
# Note: endure moves appear in BOTH 'endure' (MISS damage) and 'recovery'
# (WEAK_HIT/STRONG_HIT healing). This is intentional — the same move deals
# damage on failure and heals on success. The if/elif branches in
# apply_consequences ensure only one path runs per result type.
move_categories:
  combat:
    - combat/clash
    - combat/strike
  social:
    - adventure/compel
    - connection/make_a_connection
    - connection/test_your_relationship
  endure:
    - suffer/endure_harm
    - suffer/endure_stress
  recovery:
    - suffer/endure_harm
    - suffer/endure_stress
    - recover/resupply

# ── Disposition shifts ───────────────────────────────────────
# Progression ladder on STRONG_HIT social moves.
disposition_shifts:
  hostile: distrustful
  distrustful: neutral
  neutral: friendly
  friendly: loyal

# ── Disposition to seed emotion ──────────────────────────────
# Maps canonical dispositions to emotional_weight for auto-seeded NPC memories.
disposition_to_seed_emotion:
  hostile: hostile
  distrustful: suspicious
  neutral: neutral
  friendly: curious
  loyal: trusting


# ── Position resolver (step 2.1) ─────────────────────────────
# Engine computes position (controlled/risky/desperate) from game state.
# Each factor contributes a signed weight. Sum maps to position via thresholds.
# Default is risky when no strong signals push either way.
position_resolver:
  desperate_below: -3          # sum below this → desperate
  controlled_above: 3          # sum above this → controlled
  weights:
    # Resource pressure (each resource checked independently)
    resource_critical_below: 2   # resource value below this = critical
    resource_low_below: 3        # resource value below this = low
    resource_critical: -2        # weight per critical resource
    resource_low: -1             # weight per low resource
    # NPC disposition + bond (only when move targets an NPC)
    npc_hostile: -2
    npc_distrustful: -1
    npc_friendly: 1
    npc_loyal: 2
    npc_bond_high: 1             # bond >= 3
    npc_bond_low: -1             # bond <= 0
    # Chaos factor
    chaos_high: -1               # chaos >= 7
    chaos_low: 1                 # chaos <= 3
    # Roll momentum (consecutive results)
    consecutive_misses: -2       # 2+ consecutive misses
    consecutive_strong: 1        # 2+ consecutive strong hits
    # Threat pressure
    threat_clock_critical: -1    # per threat clock at >= 75% filled (max 2)
    # Secured advantage (decays after one turn)
    secured_advantage: 2
  # Move category baselines
  move_baselines:
    combat: -1                   # combat starts toward risky
    social: 0                    # social starts neutral
    endure: 0
    recovery: 1                  # recovery starts toward controlled
    other: 0
  # Situational overrides: evaluated after sum, can cap/floor/shift result.
  # Each override: conditions → effect. Small set (edge cases, not common path).
  overrides:
    - name: setup_under_pressure
      conditions: [secured_advantage, any_resource_critical]
      effect: cap_at_risky       # a setup play in desperation = opportunity, not safety
    - name: crisis_recovery
      conditions: [crisis_mode, recovery_move]
      effect: floor_at_risky     # healing under pressure is never safe
    - name: matched_momentum
      conditions: [previous_match, same_target_npc]
      effect: shift_up_one       # fictional momentum from a dramatic matched roll

# ── Effect resolver (step 2.2) ────────────────────────────────
# Engine computes effect (limited/standard/great) from game state.
# Same weighted scoring pattern as position resolver.
effect_resolver:
  limited_below: -2              # sum below this → limited
  great_above: 2                 # sum above this → great
  weights:
    # Position correlation
    desperate: -1                # worse position → worse effect
    controlled: 1                # better position → better effect
    # NPC bond (social moves)
    bond_high: 1                 # bond >= 3 on social move
    bond_low: -1                 # bond <= 0 on social move
    # Secured advantage
    secured_advantage: 1
  move_baselines:
    combat/strike: 1                    # strike trends toward great
    combat/clash: 0
    adventure/gather_information: 0
    adventure/compel: 0
    adventure/face_danger: 0
    other: 0

# ── Time progression resolver (step 2.3) ─────────────────────
# Engine derives time progression from move type. No AI needed.
time_progression_map:
  dialog: none
  adventure/gather_information: short
  adventure/compel: short
  connection/make_a_connection: short
  connection/test_your_relationship: short
  adventure/face_danger: short
  adventure/secure_an_advantage: short
  combat/clash: short
  combat/strike: short
  suffer/endure_harm: none
  suffer/endure_stress: none
  recover/resupply: moderate
  world_shaping: moderate
  _with_location_change: long    # any move + location_change → long
  _default: short


# ── Story defaults ────────────────────────────────────────────
# Fallback scene range when an act has no explicit range.
scene_range_default: [1, 20]

# ── Death detection ───────────────────────────────────────────
# Emotional weights that signal death-level trauma for off-screen
# death corroboration in _check_death_corroboration.
death_emotions:
  - betrayed
  - devastated

# ── Creativity seeds ─────────────────────────────────────────
# Random words used as loose inspiration for narrator opening scenes.
# Prevents generic defaults across sessions.
creativity_seeds:
  - amber
  - coyote
  - furnace
  - silk
  - glacier
  - compass
  - terracotta
  - jasmine
  - anvil
  - cobalt
  - driftwood
  - saffron
  - limestone
  - falcon
  - obsidian
  - cedar
  - mercury
  - lantern
  - basalt
  - thistle
  - copper
  - monsoon
  - flint
  - orchid
  - pewter
  - canyon
  - quartz
  - ember
  - mahogany
  - coral

# ── Memory emotional weight derivation ───────────────────────
# Engine derives emotional_weight for NPC memories from mechanical context.
# Key: (move_category, result). Value: base emotional weight.
# Disposition modifiers applied on top: hostile adds _hostile, friendly adds _warm.
memory_emotions:
  base:
    combat_MISS: "fear_pain"
    combat_WEAK_HIT: "tense_relief"
    combat_STRONG_HIT: "fierce_triumph"
    social_MISS: "suspicious_resentful"
    social_WEAK_HIT: "guarded_cautious"
    social_STRONG_HIT: "trusting_open"
    endure_MISS: "desperate_suffering"
    endure_WEAK_HIT: "grim_endurance"
    endure_STRONG_HIT: "relieved"
    recovery_WEAK_HIT: "grateful"
    recovery_STRONG_HIT: "grateful_relieved"
    other_MISS: "frustrated_setback"
    other_WEAK_HIT: "wary_uncertain"
    other_STRONG_HIT: "confident"
    dialog: "neutral"
  # Disposition modifiers: appended to base when NPC is present
  disposition_suffix:
    hostile: "_hostile"
    distrustful: "_wary"
    neutral: ""
    friendly: "_warm"
    loyal: "_devoted"

# ── Engine-generated memory templates (step 3.1) ─────────────
# Templates for NPC observation memories created by engine, not AI.
# Variables: {player}, {npc}, {intent}, {move}, {result_text}, {consequences}
# result_text is resolved from memory_result_text below.
# These produce narrative-flavored memories the narrator can build on.
memory_templates:
  action: "scene {scene}: {player} {move_verb} — {result_text}"
  action_targeted: "scene {scene}: {player} {move_verb} involving {npc} — {result_text}"
  dialog: "scene {scene}: {player} spoke with {npc} about {intent}"
  dialog_no_target: "scene {scene}: {player} engaged in conversation — {intent}"

# Result text per (category, result) — narrative fragments, not mechanical logs
memory_result_text:
  combat_MISS: "it went badly, the situation worsened"
  combat_WEAK_HIT: "managed but took damage in the process"
  combat_STRONG_HIT: "struck true and gained the upper hand"
  social_MISS: "was rebuffed, trust eroded"
  social_WEAK_HIT: "got somewhere but it came at a cost"
  social_STRONG_HIT: "connected and made real progress"
  endure_MISS: "buckled under the strain"
  endure_WEAK_HIT: "held on, barely"
  endure_STRONG_HIT: "endured and came through"
  recovery_MISS: "the attempt to recover failed"
  recovery_WEAK_HIT: "recovered somewhat"
  recovery_STRONG_HIT: "recovered well"
  other_MISS: "failed and the situation deteriorated"
  other_WEAK_HIT: "partial success with complications"
  other_STRONG_HIT: "succeeded cleanly"
  dialog: "exchanged words"

# Move verbs for memory template {move_verb}
memory_move_verbs:
  adventure/face_danger: "faced danger"
  adventure/compel: "pressed someone"
  adventure/gather_information: "investigated"
  adventure/secure_an_advantage: "prepared carefully"
  combat/clash: "fought"
  combat/strike: "attacked"
  suffer/endure_harm: "endured harm"
  suffer/endure_stress: "weathered stress"
  connection/make_a_connection: "reached out"
  connection/test_your_relationship: "tested a bond"
  recover/resupply: "resupplied"
  world_shaping: "shaped the world"
  dialog: "spoke"
  _default: "acted"

# ── Scene context template (step 3.1) ────────────────────────
# Engine-generated scene_context replaces AI-generated version.
# Variables: {location}, {move}, {result}, {npc_names}, {time}
scene_context_template: "{result} on {move_label} at {location} — {npc_summary}"
scene_context_dialog: "conversation at {location} with {npc_summary}"

# ── Consequence sentence templates (step 4) ──────────────────
# Engine generates one narrative sentence per mechanical consequence.
# Injected as <consequence> tags — narrator must weave them into prose.
# Variables: {player}, {npc}, {location}, {amount}
# Multiple templates per key: engine picks one at random.
# Severity: light = 1 damage, heavy = 2+.
consequence_templates:
  health_light:
    - "{player} takes a hit — bruised ribs, split skin, something that slows them down."
    - "The impact catches {player} in the side. Blood wells through torn fabric."
    - "Pain flares where the blow landed. {player} staggers, favoring one leg."
  health_heavy:
    - "{player} crumples. Something is broken — bone, cartilage, certainty."
    - "Blood runs freely. {player} presses both hands to the wound."
    - "{player} goes down hard. Standing takes too long and costs too much."
  spirit_light:
    - "{player}'s focus slips. Doubt creeps in."
    - "{player} falters — hands slow, breathing heavy, resolve thinning."
    - "Exhaustion drags at {player}. The task ahead looks harder now."
  spirit_heavy:
    - "{player}'s hands shake. Focus scatters."
    - "{player} stops mid-step. The purpose that drove them here feels hollow."
    - "{player}'s composure cracks — voice tight, breathing ragged."
  supply_any:
    - "{player} loses gear from the pack — dropped, broken, or spent."
    - "Supplies run low. {player} checks the pack and finds less than expected."
    - "Something essential is gone from {player}'s kit."
  momentum_loss:
    - "{player} loses momentum. The advantage is gone."
    - "The momentum shifts against {player}. Ground lost."
  bond_loss:
    - "{npc} steps back and crosses their arms. Trust broken."
    - "{npc} turns away from {player}. The conversation is over."
    - "{npc} withdraws — jaw tight, eyes averted, distance deliberate."
  health_gain:
    - "{player} catches breath. The worst pain recedes."
    - "{player} steadies. Wounded, but functional."
  spirit_gain:
    - "Clarity returns to {player}. Enough to keep moving."
    - "{player} steadies. The fog lifts, if only slightly."
  supply_gain:
    - "{player} restocks the essentials."
  bond_gain:
    - "{npc} meets {player}'s gaze and holds it. Trust, earned."
  momentum_gain:
    - "{player} finds an opening. The advantage shifts."
  disposition_shift:
    - "{npc}'s attitude toward {player} shifts — visible in posture, tone, or gaze."
  clock_tick:
    - "Time passes. The threat advances."
    - "The deadline moves closer whether {player} is ready or not."
  clock_triggered:
    - "Time's up. {clock} — {trigger}."

# Pay the Price: generic MISS consequences when the move category
# doesn't specify something more targeted. One sentence, concrete.
# Rolled from this list when no category-specific template applies.
pay_the_price:
  - "Something valuable breaks beyond easy repair."
  - "An ally's patience runs out."
  - "The environment turns hostile — what was safe, isn't."
  - "A hidden cost surfaces: this was more expensive than it looked."
  - "An old problem returns at the worst moment."
  - "The way back is now closed."
  - "Someone saw what {player} did. They won't forget."
  - "The easy option disappears. Only hard choices remain."

# ── NPC stance matrix (step 5) ───────────────────────────────
# Engine computes per-NPC stance before narrator sees anything.
# Replaces raw disposition/bond in prompt with behavioral constraint.
# Lookup: (disposition, bond_range, move_category) → stance + constraint.
# bond_range: low = 0-1, mid = 2-3, high = 4+.
# move_category: combat, social, gather_information, other.
# stance: one word. constraint: concrete behavioral limit for narrator.

stance_matrix:
  hostile:
    low:
      combat: {stance: "aggressive", constraint: "Attacks without hesitation. No quarter."}
      social: {stance: "hostile", constraint: "Refuses to engage. Threats or silence."}
      gather_information: {stance: "stonewalling", constraint: "Gives nothing. Lies if cornered."}
      other: {stance: "obstructive", constraint: "Actively works against the player."}
    mid:
      combat: {stance: "brutal", constraint: "Fights to end it, not to posture."}
      social: {stance: "confrontational", constraint: "Engages only to attack or accuse."}
      gather_information: {stance: "misleading", constraint: "Half-truths designed to harm."}
      other: {stance: "sabotaging", constraint: "Undermines without revealing intent."}
    high:
      combat: {stance: "conflicted_violent", constraint: "Fights but hesitates at key moments."}
      social: {stance: "bitter", constraint: "Engages but every word carries an edge."}
      gather_information: {stance: "grudging", constraint: "One fact, wrapped in resentment."}
      other: {stance: "reluctant_hostile", constraint: "Opposes but doesn't commit fully."}
  distrustful:
    low:
      combat: {stance: "defensive", constraint: "Protects self first. No risks for the player."}
      social: {stance: "guarded", constraint: "One short answer, then deflects or leaves."}
      gather_information: {stance: "evasive", constraint: "One fact, then silence. No elaboration."}
      other: {stance: "wary", constraint: "Cooperates minimally. Watches for betrayal."}
    mid:
      combat: {stance: "cautious_ally", constraint: "Fights alongside but keeps distance."}
      social: {stance: "testing", constraint: "Answers but probes for motives."}
      gather_information: {stance: "conditional", constraint: "Shares information but expects something back."}
      other: {stance: "transactional", constraint: "Helps if there's clear mutual benefit."}
    high:
      combat: {stance: "protective_wary", constraint: "Fights fiercely but won't take the player's word alone."}
      social: {stance: "frank", constraint: "Direct but watches for reaction."}
      gather_information: {stance: "forthcoming", constraint: "Shares what they know but flags uncertainty."}
      other: {stance: "cooperative_guarded", constraint: "Works together but keeps an exit open."}
  neutral:
    low:
      combat: {stance: "professional", constraint: "Fights if necessary. No personal stake."}
      social: {stance: "polite", constraint: "Civil but surface-level. No investment."}
      gather_information: {stance: "informative", constraint: "Answers what's asked. Volunteers nothing."}
      other: {stance: "indifferent", constraint: "Helps if convenient. Walks away if not."}
    mid:
      combat: {stance: "reliable", constraint: "Fights alongside competently."}
      social: {stance: "engaged", constraint: "Genuine conversation. Gives opinions when asked."}
      gather_information: {stance: "helpful", constraint: "Shares freely. Points toward next steps."}
      other: {stance: "willing", constraint: "Cooperates without needing persuasion."}
    high:
      combat: {stance: "solid_partner", constraint: "Trusted in a fight. Coordinates naturally."}
      social: {stance: "open", constraint: "Speaks freely. Comfortable silence between words."}
      gather_information: {stance: "generous", constraint: "Shares what they know and what they suspect."}
      other: {stance: "proactive", constraint: "Anticipates needs. Acts without being asked."}
  friendly:
    low:
      combat: {stance: "encouraging", constraint: "Fights with visible concern for the player."}
      social: {stance: "warm", constraint: "Genuine warmth but respects distance."}
      gather_information: {stance: "eager_to_help", constraint: "Shares everything they can. Apologizes for gaps."}
      other: {stance: "supportive", constraint: "Offers help before being asked."}
    mid:
      combat: {stance: "fierce_ally", constraint: "Takes risks to protect the player."}
