      combat: {stance: "bonded_warrior", constraint: "Fights as extension of the player. Wordless coordination."}
      social: {stance: "soul_bound", constraint: "Communicates in shorthand. Deep mutual understanding."}
      gather_information: {stance: "oracle", constraint: "Shares everything including things the player might not want to hear."}
      other: {stance: "ride_or_die", constraint: "All in. No reservations. No exit strategy."}
    high:
      combat: {stance: "bonded_warrior", constraint: "Fights as extension of the player. Wordless coordination."}
      social: {stance: "soul_bound", constraint: "Communicates in shorthand. Deep mutual understanding."}
      gather_information: {stance: "oracle", constraint: "Shares everything including things the player might not want to hear."}
      other: {stance: "ride_or_die", constraint: "All in. No reservations. No exit strategy."}

# ── Information gate levels (step 6) ─────────────────────────
# Engine computes per-NPC gate level (0-4) controlling what enters
# the narrator prompt. Higher gate = more information visible.
# Gate 0: name + description only (stranger)
# Gate 1: + stance + constraint (surface contact)
# Gate 2: + agenda + recent memories (some interaction)
# Gate 3: + instinct + arc + all memories (trust building)
# Gate 4: + secrets (fully open)
information_gate:
  # Points earned per factor. Gate = clamp(total_points, 0, 4).
  points:
    scenes_known_1: 0       # 0 scenes since introduction
    scenes_known_2_3: 1     # 1+ scenes
    scenes_known_4_plus: 2  # 4+ scenes
    gather_success: 1       # per successful gather_information targeting this NPC
    bond_1: 0               # bond 0-1
    bond_2_3: 1             # bond 2-3
    bond_4_plus: 2          # bond 4+
  # Stance caps: maximum gate level per stance category.
  # Prevents hostile/evasive NPCs from revealing too much.
  stance_caps:
    aggressive: 1
    hostile: 1
    stonewalling: 0
    obstructive: 1
    brutal: 1
    confrontational: 1
    misleading: 1
    sabotaging: 1
    conflicted_violent: 2
    bitter: 2
    grudging: 2
    reluctant_hostile: 2
    defensive: 1
    guarded: 2
    evasive: 1
    wary: 2
    cautious_ally: 2
    testing: 2
    conditional: 2
    transactional: 2
    protective_wary: 3
    frank: 3
    forthcoming: 3
    cooperative_guarded: 3
    # Neutral and above: no cap (defaults to 4)
  default_cap: 4

# ── Enums ─────────────────────────────────────────────────────
# Single source of truth for all enum-like values used across the engine.
# Python reads these at runtime; schemas are built from them dynamically.
enums:
  time_phases:
    - early_morning
    - morning
    - midday
    - afternoon
    - evening
    - late_evening
    - night
    - deep_night
  npc_statuses:
    - active
    - background
    - deceased
    - lore
  dispositions:
    - hostile
    - distrustful
    - neutral
    - friendly
    - loyal
  memory_types:
    - observation
    - reflection
  clock_types:
    - threat
    - scheme
    - progress
  thread_types:
    - vow
    - goal
    - tension
    - subplot
  story_structures:
    - 3act
    - kishotenketsu
  positions:
    - controlled
    - risky
    - desperate

# ── Memory retrieval weights ─────────────────────────────────
memory_retrieval_weights:
  recency: 0.40
  importance: 0.35
  relevance: 0.25

# ── Opening scene defaults ───────────────────────────────────
opening:
  time_of_day: morning
  clock_segments: 6
  clock_filled: 1
  clock_trigger_template: "Threat escalates beyond {player}'s control"

# ── Move routing ─────────────────────────────────────────────
# Maps moves to resource tracks for miss damage and recovery healing.
# These replace hardcoded Python dicts with config-driven lookups.
move_routing:
  miss_endure:
    suffer/endure_harm: health
    suffer/endure_stress: spirit
  recovery:
    suffer/endure_harm: {track: health, cap: health_max}
    suffer/endure_stress: {track: spirit, cap: spirit_max}
    recover/resupply: {track: supply, cap: supply_max}

# ── Architect constraints ────────────────────────────────────
architect:
  forbidden_moods:
    - surreal
    - disorienting
    - revelatory
    - haunted
    - spectral
    - ethereal
    - otherworldly
    - eldritch
    - supernatural
    - dreamlike
    - hallucinatory
    - phantasmagoric
    - uncanny

# ── Threats and menace ────────────────────────────────────────
# Threats compete against vow progress via menace tracks.
# Menace fills on misses and autonomous ticks. Full menace → Forsake Your Vow.
threats:
  menace_on_miss: 1                 # Menace marks on MISS (linked threat only)
  autonomous_tick_chance: 0.15      # Per-scene chance each active threat ticks menace
  menace_high_threshold: 0.75       # Menace ratio above this = "near tipping point"
  forsake_spirit_cost: 2            # Spirit damage when menace forces Forsake Your Vow

# ── Progress tracks ───────────────────────────────────────────
# Ticks-per-mark by rank for progress tracks and threat menace tracks.
# Higher rank = slower progress (more ticks needed per mark).
# Distinct from legacy.ticks_by_rank, which is the inverse XP-reward table.
#
# Structure is extensible: track_types is a map keyed by track variant.
# Current variants all use the same table (`default`). Future variants
# (site-exploration tracks, phased thread tracks) can add their own keys
# without breaking the existing one.
progress:
  track_types:
    default:
      ticks_per_mark:
        troublesome: 12              # 3 boxes (12 ticks) per mark
        dangerous: 8                 # 2 boxes (8 ticks) per mark
        formidable: 4                # 1 box (4 ticks) per mark
        extreme: 2                   # 2 ticks per mark
        epic: 1                      # 1 tick per mark

# ── Legacy tracks and XP ──────────────────────────────────────
# Legacy tracks (quests, bonds, discoveries) persist across chapters.
# Filled boxes grant XP. XP is spent on asset abilities or new assets.
legacy:
  xp_per_box: 2                     # XP per filled box on any legacy track
  starting_rank: epic               # All legacy tracks: 1 tick/mark (rank-adjusted by source vow/bond)
  threat_overcome_bonus: 2          # Bonus XP when vow completes with overcome threat at high menace
  threat_overcome_threshold: 0.5    # Menace ratio >= this to earn overcome bonus
  asset_upgrade_cost: 2             # XP per asset ability upgrade
  new_asset_cost: 3                 # XP for a new asset
  # Ticks-per-mark by progress rank (Ironsworn standard).
  # Used by mark_legacy to scale legacy track gain by the source vow/bond rank.
  ticks_by_rank:
    troublesome: 1
    dangerous: 2
    formidable: 4
    extreme: 8
    epic: 12

# ── Impacts ───────────────────────────────────────────────────
# Impacts are persistent conditions that reduce max_momentum by 1 each.
# Some block specific recovery moves. Permanent impacts never clear naturally.
impacts:
  # Misfortunes — situational harm
  wounded:
    label: wounded
    description: "A serious physical injury that won't heal on its own"
    blocks_recovery: health          # heal move blocked until cleared
    permanent: false
  shaken:
    label: shaken
    description: "A psychic wound that lingers"
    blocks_recovery: spirit          # hearten move blocked until cleared
    permanent: false
  unprepared:
    label: unprepared
    description: "Without proper gear or supplies"
    blocks_recovery: supply          # resupply blocked until cleared
    permanent: false
  # Burdens — personal obligations
  doomed:
    label: doomed
    description: "Marked for death, fate closing in"
    blocks_recovery: ""
    permanent: false
  tormented:
    label: tormented
    description: "Haunted by guilt or loss"
    blocks_recovery: ""
    permanent: false
  indebted:
    label: indebted
    description: "Owes a significant debt that demands repayment"
    blocks_recovery: ""
    permanent: false
  # Vehicle troubles (command_vehicle, Sundered Isles ships)
  battered:
    label: battered
    description: "Vessel is beaten up, barely holding together"
    blocks_recovery: ""
    permanent: false
  cursed:
    label: cursed
    description: "Vessel bears an ill omen"
    blocks_recovery: ""
    permanent: false
  # Lasting effects — permanent
  permanently_harmed:
    label: permanently harmed
    description: "A wound that will never fully heal"
    blocks_recovery: ""
    permanent: true
  traumatized:
    label: traumatized
    description: "A mental scar that will never fully fade"
    blocks_recovery: ""
    permanent: true

# ── Fate system (Mythic GME 2e) ──────────────────────────────
# Probabilistic yes/no questions about the fiction.
# Data in data/mythic_gme_2e.json. Config here controls method and likelihood.
fate:
  default_method: fate_chart        # fate_chart or fate_check
  # Odds modifier table (Mythic GME 2e fate check)
  odds_modifiers:
    certain: 5
    nearly_certain: 4
    very_likely: 2
    likely: 1
    fifty_fifty: 0
    unlikely: -1
    very_unlikely: -2
    nearly_impossible: -4
    impossible: -5
  # Chaos-factor modifier table (fate check), keyed by chaos_factor 1–9
  chaos_modifiers:
    1: -5
    2: -4
    3: -2
    4: -1
    5: 0
    6: 1
    7: 2
    8: 4
    9: 5
  likelihood_rules:
    # NPC disposition → score modifier
    disposition_scores:
      hostile: -3
      distrustful: -2
      neutral: 0
      friendly: 2
      loyal: 3
    # Chaos factor thresholds
    chaos_thresholds:
      high: 7
      low: 3
    chaos_scores:
      high: -1                      # High chaos = less favorable
      low: 1                        # Low chaos = more favorable
    # Resource pressure
    resource_critical_below: 2
    resource_scores:
      critical: -1
    # Score → odds mapping (checked in order, first match wins)
    score_to_odds:
      - {min_score: 5, odds: certain}
      - {min_score: 4, odds: nearly_certain}
      - {min_score: 3, odds: very_likely}
      - {min_score: 1, odds: likely}
      - {min_score: -1, odds: fifty_fifty}
      - {min_score: -3, odds: unlikely}
      - {min_score: -4, odds: very_unlikely}
      - {min_score: -5, odds: nearly_impossible}
      - {min_score: -99, odds: impossible}

# ── Track-creating moves (step 8) ────────────────────────────
# Moves that create a new progress track. Brain must supply track_name.
# track_category maps to ProgressTrack.track_type.
track_creating_moves:
  quest/swear_an_iron_vow: vow
  connection/make_a_connection: connection
  combat/enter_the_fray: combat
  exploration/undertake_an_expedition: expedition
  scene_challenge/begin_the_scene: scene_challenge

# Moves that also mark progress on an active scene_challenge track.
# When a scene challenge is active and the player uses one of these adventure moves,
# the engine marks progress on the scene_challenge track in addition to normal outcome.
scene_challenge_progress_moves:
  - adventure/face_danger
  - adventure/secure_an_advantage

# ── Move outcomes (step 7b) ──────────────────────────────────
# Data-driven mechanical effects per move per result.
# Simple moves: list of effect strings.
# Complex moves: handler name + params dict.
# See mechanics/move_outcome.py for effect vocabulary.

move_outcomes:

  # ── Adventure moves ──────────────────────────────────────────

  adventure/face_danger:
    strong_hit: [momentum +1]
    weak_hit: [suffer_move -1]
    miss: [pay_the_price]

  adventure/secure_an_advantage:
    strong_hit: [momentum +2, next_move_bonus +1]
    weak_hit: [momentum +2]           # resolved choice: momentum over next_move_bonus
    miss: [pay_the_price]

  adventure/gather_information:
    strong_hit: [momentum +2]
    weak_hit: [momentum +1]
    miss: [pay_the_price]

  adventure/compel:
    strong_hit: [momentum +1, bond +1]
    weak_hit: [momentum +1]
    miss: [pay_the_price]

  adventure/check_your_gear:
    strong_hit: [momentum +1]
    weak_hit: [supply -1]             # resolved choice: supply loss over momentum loss
    miss: [pay_the_price]

  # ── Combat moves ─────────────────────────────────────────────

  combat/enter_the_fray:
    strong_hit: [momentum +2, position in_control]
    weak_hit: [momentum +2]           # resolved choice: momentum over position
    miss: [position bad_spot]

  combat/strike:
    strong_hit: [mark_progress 2, position in_control]
    weak_hit: [mark_progress 2, position bad_spot]
    miss: [pay_the_price, position bad_spot]

  combat/clash:
    strong_hit: [mark_progress 2, position in_control]
    weak_hit: [mark_progress 1, pay_the_price, position bad_spot]
    miss: [pay_the_price, position bad_spot]

  combat/gain_ground:
    strong_hit: [mark_progress 1, momentum +2]   # resolved choice: progress + momentum
    weak_hit: [mark_progress 1]                   # resolved choice: progress
    miss: [pay_the_price, position bad_spot]

  combat/react_under_fire:
    strong_hit: [momentum +1, position in_control]
    weak_hit: [suffer_move -1, position bad_spot]
    miss: [pay_the_price, position bad_spot]

  combat/battle:
    strong_hit: [momentum +2]
    weak_hit: [pay_the_price]
    miss: [pay_the_price]

  combat/take_decisive_action:
    strong_hit: [momentum +1, position in_control]
    weak_hit: [pay_the_price, position bad_spot]
    miss: [pay_the_price]

  # ── Quest moves ──────────────────────────────────────────────

  quest/swear_an_iron_vow:
    strong_hit: [momentum +2]
    weak_hit: [momentum +1]
    miss: [narrative]

  quest/fulfill_your_vow:
    strong_hit: [legacy_reward quests]
    weak_hit: [legacy_reward quests]   # full reward if player swears follow-up vow
    miss: [narrative]                  # player chooses: forsake or recommit

  # ── Connection moves ─────────────────────────────────────────

  connection/make_a_connection:
    strong_hit: [momentum +1, bond +1, disposition_shift]
    weak_hit: [momentum +1, bond +1]
    miss: [pay_the_price]

  connection/develop_your_relationship:
    strong_hit: [legacy_reward bonds]  # 2 ticks on bonds legacy
    weak_hit: [momentum +2]
    miss: [narrative]

  connection/test_your_relationship:
    strong_hit: [bond +1, disposition_shift]  # triggers Develop Your Relationship
    weak_hit: [bond +1]                       # triggers Develop Your Relationship + complication
    miss: [pay_the_price]

  connection/forge_a_bond:
    strong_hit: [legacy_reward bonds]
    weak_hit: [legacy_reward bonds]    # conditional on fulfilling request
    miss: [narrative]

  # ── Exploration moves ────────────────────────────────────────

  exploration/undertake_an_expedition:
    strong_hit: [mark_progress 1]
    weak_hit: [mark_progress 1, suffer_move -2]  # resolved choice: suffer en route
    miss: [pay_the_price]

  exploration/explore_a_waypoint:
    strong_hit: [momentum +2]          # resolved choice: opportunity over progress
    weak_hit: [momentum +1]
    miss: [pay_the_price]

  exploration/set_a_course:
    strong_hit: [momentum +1]
    weak_hit: [suffer_move -2]         # resolved choice: suffer costs en route
    miss: [pay_the_price]

  exploration/finish_an_expedition:
    strong_hit: [legacy_reward discoveries]
    weak_hit: [narrative]              # legacy reward at reduced rank
    miss: [pay_the_price]              # resolved choice: abandon

  # ── Recover moves ────────────────────────────────────────────

  recover/heal:
    handler: recovery
    params:
      track: health
      full_amount: 3
      impact_amount: 2
      blocking_impact: wounded
      weak_hit_cost_type: momentum
      weak_hit_cost: -2

  recover/hearten:
    handler: recovery
    params:
      track: spirit
      full_amount: 2
      impact_amount: 1
      blocking_impact: shaken
      weak_hit_cost_type: momentum
      weak_hit_cost: -1

  recover/resupply:
    handler: recovery
    params:
      track: supply
      full_amount: 2
      impact_amount: 1
      blocking_impact: unprepared
      weak_hit_cost_type: momentum
      weak_hit_cost: -1

  recover/repair:
    # Repair uses a point system that depends on situation (at facility / in field / under fire).
    # Engine cannot determine situation automatically — treat as narrative with resource effect.
    strong_hit: [narrative]
    weak_hit: [narrative]
    miss: [pay_the_price]

  recover/sojourn:
    # Sojourn triggers other recovery moves (Heal, Hearten, Repair, Resupply) as auto-strong-hits.
    # For now, apply a broad recovery effect.
    strong_hit: [health +2, spirit +1]   # approximation of 2 recovery sub-moves
    weak_hit: [health +1]                # approximation of 1 recovery sub-move
    miss: [pay_the_price]

  # ── Suffer moves ─────────────────────────────────────────────

  suffer/endure_harm:
    handler: suffer
    params:
      track: health
      recovery: 1
      miss_extra_track: -1
      miss_extra_momentum: -2
      impact_pair: [wounded, permanently_harmed]
      blocking_impact: wounded

  suffer/endure_stress:
    handler: suffer
    params:
      track: spirit
      recovery: 1
      miss_extra_track: -1
      miss_extra_momentum: -2
      impact_pair: [shaken, traumatized]
      blocking_impact: shaken

  suffer/withstand_damage:
    handler: suffer
    params:
      track: integrity
      recovery: 1
      miss_extra_track: -1
      miss_extra_momentum: -2
      impact_pair: [battered, cursed]
      blocking_impact: battered

  suffer/companion_takes_a_hit:
    handler: suffer
    params:
      track: companion_health
      recovery: 1
      miss_extra_track: -1
      miss_extra_momentum: -2
      impact_pair: []
      blocking_impact: ""

  suffer/lose_momentum:
    strong_hit: [narrative]
    weak_hit: [narrative]
    miss: [narrative]

  suffer/sacrifice_resources:
    strong_hit: [narrative]
    weak_hit: [narrative]
    miss: [narrative]

  # ── Threshold moves ──────────────────────────────────────────

  threshold/face_death:
    handler: threshold
    params:
      impact: doomed
      game_over_text: "you are dead"

  threshold/face_desolation:
    handler: threshold
    params:
      impact: tormented
      game_over_text: "you succumb to despair and are lost"

  # ── Scene challenge moves ────────────────────────────────────

  scene_challenge/face_danger:
    strong_hit: [mark_progress 1]
    weak_hit: [mark_progress 1, fill_clock 1]
    miss: [fill_clock 1, pay_the_price]

  scene_challenge/secure_an_advantage:
    strong_hit: [momentum +2, next_move_bonus +1]
    weak_hit: [momentum +2]           # resolved choice: momentum over bonus
    miss: [fill_clock 1, pay_the_price]

  scene_challenge/finish_the_scene:
    strong_hit: [narrative]
    weak_hit: [pay_the_price]
    miss: [pay_the_price]


  # ── Classic-specific moves ───────────────────────────────────
  # Classic uses different category names: relationship/ instead of connection/

  adventure/heal:
    handler: recovery
    params:
      track: health
      full_amount: 3
      impact_amount: 2
      blocking_impact: wounded
      weak_hit_cost_type: supply
      weak_hit_cost: -1

  adventure/make_camp:
    # Resolved choice: recuperate + focus
    strong_hit: [health +1, momentum +1]
    weak_hit: [health +1]
    miss: [pay_the_price]

  adventure/reach_your_destination:
    # Progress roll for journeys (Classic equivalent of Finish an Expedition)
    strong_hit: [momentum +1]
    weak_hit: [narrative]
    miss: [pay_the_price]

  adventure/resupply:
    strong_hit: [supply +2]
    weak_hit: [supply +2, momentum -2]   # take supply but lose momentum
    miss: [pay_the_price]

  adventure/undertake_a_journey:
    strong_hit: [mark_progress 1]
    weak_hit: [mark_progress 1, supply -1]
    miss: [pay_the_price]

  combat/end_the_fight:
    # Progress roll for combat (Classic equivalent of Take Decisive Action)
    strong_hit: [narrative]
    weak_hit: [pay_the_price]
    miss: [pay_the_price]

  relationship/compel:
    strong_hit: [momentum +1, bond +1]
    weak_hit: [momentum +1]
    miss: [pay_the_price]

  relationship/draw_the_circle:
    strong_hit: [momentum +1]
    weak_hit: [momentum +1]
    miss: [pay_the_price]

  relationship/forge_a_bond:
    strong_hit: [bond +1]
    weak_hit: [bond +1]                  # conditional on fulfilling request
    miss: [pay_the_price]

  relationship/sojourn:
    # Resolved choice: recuperate + relax
    strong_hit: [health +1, spirit +1]
    weak_hit: [health +1]
    miss: [pay_the_price]

  relationship/test_your_bond:
    strong_hit: [spirit +1]              # resolved choice: spirit over momentum
    weak_hit: [narrative]
    miss: [pay_the_price]

  suffer/companion_endure_harm:
    handler: suffer
    params:
      track: companion_health
      recovery: 1
      miss_extra_track: -1
      miss_extra_momentum: -1
      impact_pair: []
      blocking_impact: ""

  suffer/face_death:
    handler: threshold
    params:
      impact: doomed
      game_over_text: "you are dead"

  suffer/face_desolation:
    handler: threshold
    params:
      impact: tormented
      game_over_text: "you succumb to despair and are lost"

  # ── Delve-specific moves ─────────────────────────────────────

  delve/check_your_gear:
    strong_hit: [momentum +1]
    weak_hit: [momentum +1, supply -1]
    miss: [pay_the_price]

  delve/delve_the_depths:
    strong_hit: [mark_progress 1]
    weak_hit: [narrative]                # roll on table per stat (narrator constraint)
    miss: [narrative]                    # Reveal a Danger (narrator constraint)

  delve/escape_the_depths:
    strong_hit: [momentum +1]
    weak_hit: [narrative]                # resolved choice: one cost
    miss: [narrative]                    # Reveal a Danger

  delve/locate_your_objective:
    # Progress roll for delve sites
    strong_hit: [momentum +1]
    weak_hit: [narrative]
    miss: [pay_the_price]

# ── Tuning parameters (previously magic numbers in Python) ───
# Every value here was a hardcoded constant in source code. Moving them
# here makes behavior tunable without code changes.

# Fuzzy string matching thresholds (NPC names, aliases, dedup).
fuzzy_match:
  min_word_length: 5              # Minimum length for a word to participate in fuzzy match
  min_phrase_length: 12           # Minimum length for a phrase-level fuzzy match
  exact_dedup_threshold: 0.4      # Jaccard similarity below this = not a duplicate

# NPC matching scoring.
npc_matching:
  stt_alias_bonus: 10             # Score bonus for a starts-with alias match
  stt_phrase_length: 12           # Phrase length cut-off for starts-with bonus
  alias_min_length: 4             # Minimum alias character length to register

# Parser monologue detection.
monologue_detection:
  min_word_count: 30              # NPC speech shorter than this is not a monologue

# Act progression thresholds.
act_progress:
  filler_max: 1                   # Scenes with intensity <= this are treated as filler
  recap_scene_max: 5              # Chapter-summary recap keeps at most this many scenes

# Web server rate limiting and readiness probe.
rate_limit:
  window_seconds: 5.0             # Rolling window size
  max_requests: 20                # Max messages per client per window
  warn_probe_max_tries: 100       # Readiness-probe retry attempts before giving up
  warn_probe_poll_seconds: 0.1    # Sleep between readiness-probe retries

# Provider retry policy (transient HTTP failures).
retry:
  max_retries: 2                  # Retry count before surfacing the error
  retryable_http_codes:           # HTTP status codes that trigger retry
    - 429
    - 500
    - 502
    - 503
    - 529
  backoff_base: 2                 # Exponential backoff base: delay = base ** attempt

# TF-IDF activation scoring windows and caps.
tf_idf:
  token_min_length: 3             # Minimum token length for TF-IDF indexing
  memory_window: 5                # Last N memories considered for document frequency
  session_window: 2               # Last N session turns considered for target detection
  score_floor: 0.05               # Minimum TF-IDF score for a token to contribute
  memory_score_cap: 0.5           # Upper bound on memory-sourced TF-IDF contribution
  memory_score_multiplier: 1.5    # Multiplier applied to memory-sourced scores pre-cap
  recency_window: 3               # Last N turns weighted as recent interaction
  recency_offset: 2               # Offset applied when computing recency decay index

# NPC memory tuning.
memory:
  min_token_length: 3             # Ignore tokens shorter than this when scoring memories
  consolidation_floor: 3          # Minimum number of recency-budget slots during consolidation
  unknown_emotion_importance: 4   # Base importance for an emotion that is not in emotions.yaml

# Chaos resolver thresholds (position + clock pressure).
chaos_resolver:
  high_threshold: 7               # chaos_factor >= this = high chaos
  low_threshold: 3                # chaos_factor <= this = low chaos
  recent_session_window: 3        # How many session entries form the "recent" roll window
  recent_result_window: 2         # Streak length for consecutive-result scoring
  clock_pressure_threshold: 0.75  # Clock fill ratio above this = pressure
  clock_pressure_cap_multiplier: 2  # Max clocks that count toward pressure (cap = weight * this)

# NPC lifecycle: description deduplication scoring.
description_dedup:
  identity_score_delta: 1000      # Score added for "currently present" bonus in retire_distant_npcs
  bond_multiplier: 3              # Bond value multiplier in relevance score
  # Richness scoring weights (absorb_duplicate_npc)
  richness_alias: 2               # Weight per alias when computing NPC richness
  richness_description: 3         # Weight per description presence
  richness_aim: 3                 # Weight per agenda / instinct presence
  richness_memory: 2              # Weight per memory-count unit
  richness_other: 1               # Weight for remaining fields (description bool)
  # Alias sanitisation
  max_alias_word_count: 4         # Aliases with more words than this are discarded as descriptor prose
  # Description-to-description match thresholds
  min_desc_chars: 10              # Minimum description length to run the match
  min_word_chars_for_match: 4     # Word char length to count toward the word set
  min_new_word_count: 2           # Minimum distinctive word count required in the new description
  min_substring_match_len: 5      # Both words must be at least this long to allow substring matching
  long_word_chars: 12             # Words this long or longer trigger the "long match" bonus
  partial_match_weight: 0.5       # Weight of substring / long-word matches vs exact overlap
  effective_overlap_min: 2.0      # Minimum effective overlap to accept a match
  min_overlap_ratio: 0.25         # Minimum overlap / smaller-set-size ratio to accept a match

# Rule validator format/structure thresholds.
rule_validator:
  # NPC-monologue check: flag when 4+ quotes appear with minimal narrative gaps.
  min_quote_count: 4              # Minimum quote count to run the check at all
  max_gap_chars: 40               # Gap char length below which a gap counts as "short"
  max_consecutive_short_gaps: 3   # Streak of short gaps that triggers a violation

# Parser splitting thresholds.
parser:
  max_label_length: 30            # Labels longer than this are not treated as role prefixes
  min_line_length: 4              # Lines shorter than this are ignored during splitting

# Story state intensity smoothing.
story_state:
  intensity_smoothing_current: 0.3   # Current-scene weight in smoothed intensity
  intensity_smoothing_previous: 0.7  # Previous-scene weight in smoothed intensity
  crisis_scene_offset: 5             # Scenes before crisis fires used as floor offset

# Chapter transition thresholds.
chapter:
  filler_max: 1                   # Scenes with intensity <= this are filler for transition heuristic
  open_threads_max: 5             # Max open threads included in new-chapter prompt

# Shared opening setup.
setup_common:
  part_name_min_length: 4         # Minimum character count for a part name to be accepted

# Metadata cross-vote thresholds.
metadata_voting:
  min_cross_votes: 1              # Minimum corroborating voters for a cross-vote to pass
  min_total_votes: 2              # Minimum total voters (reporter + corroborators)

# NPC naming.
naming:
  callsign_probability: 0.5       # Probability of callsign-only name when 3+ name tables exist

# Random-event pipeline tuning (Mythic GME 2e).
random_events:
  threat_target_probability: 0.5  # Probability that a threat-eligible focus targets a threat
  description_focus_categories:   # Focus categories that roll on the descriptions meaning table
    - ambiguous_event
  # Focus categories that require a target from the characters list.
  npc_focus_categories:
    - npc_action
    - npc_negative
    - npc_positive
    - new_npc
  # Focus categories that require a target from the threads list.
  thread_focus_categories:
    - move_toward_thread
    - move_away_from_thread
    - close_thread
  # Focus categories that can target an active threat (menace advance).
  # When threats exist, threat_target_probability decides threat vs generic.
  threat_eligible_focus_categories:
    - pc_negative
    - move_away_from_thread
  list_weight_max: 3              # Cap on weight bumps per character/thread
  consolidation_threshold: 25     # Consolidate characters/threads list at this size
  consolidation_weight_high: 3    # Weights at or above this become weight 2 after consolidation
  consolidation_weight_low: 2     # Weight assigned to above-threshold entries post-consolidation
  consolidation_weight_default: 1 # Weight assigned to everyone else post-consolidation

