# Straightjacket configuration
# For game mechanics, see engine.yaml. For AI prompts, see prompts.yaml.

server:
  host: "127.0.0.1"
  port: 8081

ai:
  provider: "openai_compatible"
  api_base: "https://api.cerebras.ai/v1"
  api_key_env: "CEREBRAS_API_KEY"
  prompts_file: "prompts.yaml"

  # ── Model clusters ──────────────────────────────────────────
  # Clusters are the single source of truth for all AI call parameters.
  # Every field is required. No per-role overrides — to change a role's
  # parameters, change the cluster or remap the role via role_cluster.
  #
  # Built-in role → cluster mapping (override via role_cluster):
  #   narrator:        narrator
  #   creative:        architect, director
  #   classification:  brain, correction
  #   analytical:      validator, validator_architect, narrator_metadata,
  #                    opening_setup, revelation_check, chapter_summary, recap
  clusters:
    narrator:
      model: "zai-glm-4.7"
      temperature: 1.0
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3
      extra_body:
        reasoning_effort: "none"
    creative:
      model: "zai-glm-4.7"
      temperature: 0.8
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3
      extra_body:
        reasoning_effort: "none"
    classification:
      model: "zai-glm-4.7"
      temperature: 0.5
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3
      extra_body:
        reasoning_effort: "none"
    analytical:
      model: "gpt-oss-120b"
      temperature: 0.5
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3

  # role_cluster:
  #   architect: "analytical"       # Remap a role to a different cluster

language:
  narration_language: "English"
  default_player_name: "Unnamed"
