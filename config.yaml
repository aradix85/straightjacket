
server:
  host: "127.0.0.1"
  port: 8081

ai:
  provider: "openai_compatible"
  api_base: "https://api.cerebras.ai/v1"
  api_key_env: "CEREBRAS_API_KEY"
  prompts_dir: "prompts"

  clusters:
    narrator:
      model: "zai-glm-4.7"
      temperature: 1.0
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3
      extra_body:
        reasoning_effort: "none"
    creative:
      model: "gpt-oss-120b"
      temperature: 0.7
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3
      extra_body:
        reasoning_effort: "medium"
    classification:
      model: "gpt-oss-120b"
      temperature: 0.5
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3
      extra_body:
        reasoning_effort: "low"
    judgment:
      model: "gpt-oss-120b"
      temperature: 0.5
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3
      extra_body:
        reasoning_effort: "medium"
    extraction:
      model: "gpt-oss-120b"
      temperature: 0.3
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3
      extra_body:
        reasoning_effort: "low"

  role_cluster:
    narrator: narrator
    architect: creative
    director: creative
    chapter_summary: creative
    recap: creative
    brain: classification
    correction: classification
    revelation_check: judgment
    narrator_metadata: extraction
    opening_setup: extraction

language:
  narration_language: "English"
