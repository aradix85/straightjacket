# Straightjacket configuration
# For game mechanics, see engine/*.yaml. For AI prompts, see prompts/*.yaml.

server:
  host: "127.0.0.1"
  port: 8081

ai:
  provider: "openai_compatible"
  api_base: "https://api.cerebras.ai/v1"
  api_key_env: "CEREBRAS_API_KEY"
  prompts_dir: "prompts"

  # ── Model clusters ──────────────────────────────────────────
  # Two models across four clusters: GLM 4.7 for narrator (prose), GPT-OSS for everything else.
  # GLM 4.7 (zai-glm-4.7 on Cerebras): top open-weight model on Artificial Analysis Intelligence
  # Index, Z.ai positions it for chat, creative writing, and role-play with "more natural and
  # stable interactions, fewer abrupt shifts in tone or intent". Replaces Qwen 3 (deprecated on
  # Cerebras 2026-05-27). Reasoning is disabled via extra_body — narrator wants prose, not
  # internal think-blocks. GLM 4.7 has a strong primacy bias: hard constraints (engine-dictated
  # consequences, genre constraints, no-silver-lining directives) belong at the absolute start
  # of the system prompt, not the end. Migration tuning baseline: validator drift wordlists,
  # pacing thresholds, and prompt ordering were tuned for Qwen — re-baseline via Elvira after
  # the switch.
  # GPT-OSS: fast, cheap, strong on structured output and classification.
  clusters:
    narrator:
      model: "zai-glm-4.7"
      temperature: 0.7
      top_p: 0.8
      max_tokens: 8192
      max_retries: 3
      # Cerebras-specific: disable GLM 4.7's internal reasoning for narrator calls.
      # Prose generation gets no benefit from <think> blocks and they slow output and inflate
      # token cost. Keep enabled for the analytical and creative clusters if a future migration
      # of those clusters to GLM happens.
      extra_body:
        reasoning_effort: "none"
    creative:
      model: "gpt-oss-120b"
      temperature: 0.7
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3
    classification:
      model: "gpt-oss-120b"
      temperature: 0.5
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3
    analytical:
      model: "gpt-oss-120b"
      temperature: 0.5
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3

  # ── Role → cluster mapping ──────────────────────────────────
  # Every AI role must appear here. Unlisted roles raise at runtime.
  role_cluster:
    narrator: narrator
    architect: creative
    director: creative
    brain: classification
    correction: classification
    validator: analytical
    validator_architect: analytical
    chapter_validator: analytical
    narrator_metadata: analytical
    opening_setup: analytical
    revelation_check: analytical
    chapter_summary: analytical
    recap: analytical

language:
  narration_language: "English"
