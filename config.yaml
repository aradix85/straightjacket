# Straightjacket configuration
# For game mechanics, see engine.yaml. For AI prompts, see prompts.yaml.

server:
  host: "127.0.0.1"
  port: 8081

ai:
  provider: "openai_compatible"
  api_base: "https://api.cerebras.ai/v1"
  api_key_env: "CEREBRAS_API_KEY"
  prompts_file: "prompts.yaml"

  # ── Model clusters ──────────────────────────────────────────
  # Two clusters: Qwen 3 for narrator (prose), GPT-OSS for everything else.
  # Qwen 3: best narrator quality (100% eval), optimized for creative writing.
  # GPT-OSS: fast, cheap, strong on structured output and classification.
  #
  # Built-in role → cluster mapping (override via role_cluster):
  #   narrator:        narrator
  #   creative:        architect, director
  #   classification:  brain, correction
  #   analytical:      validator, validator_architect, narrator_metadata,
  #                    opening_setup, revelation_check, chapter_summary, recap
  clusters:
    narrator:
      model: "qwen-3-235b-a22b-instruct-2507"
      temperature: 0.7
      top_p: 0.8
      max_tokens: 8192
      max_retries: 3
    creative:
      model: "gpt-oss-120b"
      temperature: 0.7
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3
    classification:
      model: "gpt-oss-120b"
      temperature: 0.5
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3
    analytical:
      model: "gpt-oss-120b"
      temperature: 0.5
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3

  # role_cluster:
  #   architect: "analytical"       # Remap a role to a different cluster

language:
  narration_language: "English"
  default_player_name: "Unnamed"
