# Straightjacket configuration
# For game mechanics, see engine.yaml. For AI prompts, see prompts.yaml.

server:
  host: "127.0.0.1"
  port: 8081

ai:
  provider: "openai_compatible"
  api_base: "https://api.cerebras.ai/v1"
  api_key_env: "CEREBRAS_API_KEY"
  prompts_file: "prompts.yaml"

  # ── Model clusters ──────────────────────────────────────────
  # Two models across four clusters: Qwen 3 for narrator (prose), GPT-OSS for everything else.
  # Qwen 3: best narrator quality (100% eval), optimized for creative writing.
  # GPT-OSS: fast, cheap, strong on structured output and classification.
  clusters:
    narrator:
      model: "qwen-3-235b-a22b-instruct-2507"
      temperature: 0.7
      top_p: 0.8
      max_tokens: 8192
      max_retries: 3
    creative:
      model: "gpt-oss-120b"
      temperature: 0.7
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3
    classification:
      model: "gpt-oss-120b"
      temperature: 0.5
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3
    analytical:
      model: "gpt-oss-120b"
      temperature: 0.5
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3

  # ── Role → cluster mapping ──────────────────────────────────
  # Every AI role must appear here. Unlisted roles raise at runtime.
  role_cluster:
    narrator: narrator
    architect: creative
    director: creative
    brain: classification
    correction: classification
    validator: analytical
    validator_architect: analytical
    narrator_metadata: analytical
    opening_setup: analytical
    revelation_check: analytical
    chapter_summary: analytical
    recap: analytical

language:
  narration_language: "English"
  default_player_name: "Unnamed"
