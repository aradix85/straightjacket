# Straightjacket configuration
# General settings — API provider, language.
# For game mechanics, see engine.yaml.
# For AI prompts, see prompts.yaml.

# ── Server ────────────────────────────────────────────────────
server:
  host: "127.0.0.1"        # Bind address. Use "0.0.0.0" for LAN play.
  port: 8081

# ── AI provider ───────────────────────────────────────────────
# provider: "anthropic" or "openai_compatible"
# api_base: only needed for openai_compatible
# api_key_env: environment variable name that holds the API key
#
# Model assignment (Cerebras):
#   GLM-4.7 — brain, narrator, director, architect (creative + classification)
#   Qwen3 235B Instruct — validator, fast_model (analytical, structured output)

ai:
  provider: "openai_compatible"
  api_base: "https://api.cerebras.ai/v1"
  api_key_env: "CEREBRAS_API_KEY"
  prompts_file: "prompts.yaml"
  brain_model: "zai-glm-4.7"
  narrator_model: "zai-glm-4.7"
  director_model: "zai-glm-4.7"
  validator_model: "qwen-3-235b-a22b-instruct-2507"
  fast_model: "qwen-3-235b-a22b-instruct-2507"
  extra_body:
    default:                           # GLM roles
      reasoning_effort: "none"
    validator: {}                      # Qwen — no reasoning_effort
    validator_architect: {}
    narrator_metadata: {}
    opening_setup: {}
    revelation_check: {}
    recap: {}
    chapter_summary: {}

  max_tokens:
    brain: 8192
    brain_setup: 8192
    narrator: 8192
    narrator_metadata: 8192
    opening_setup: 8192
    revelation_check: 8192
    recap: 8192
    architect: 8192
    director: 8192
    correction: 8192
    chapter_summary: 8192
    validator: 8192
    validator_architect: 8192
  max_retries:
    brain: 3
    brain_setup: 3
    narrator: 3
    narrator_metadata: 3
    opening_setup: 3
    revelation_check: 3
    recap: 3
    architect: 3
    director: 3
    correction: 3
    chapter_summary: 3
    validator: 3
    validator_architect: 3
  max_tool_rounds:
    brain: 3
    director: 3
  temperature:
    brain: 0.6
    brain_setup: 0.6
    narrator: 1.0
    narrator_metadata: 0.3
    opening_setup: 0.6
    revelation_check: 0.3
    recap: 0.6
    architect: 0.8
    director: 0.8
    correction: 0.3
    chapter_summary: 0.6
    validator: 0.3
    validator_architect: 0.3
  top_p:
    default: 0.95

# ── Language ──────────────────────────────────────────────────
language:
  narration_language: "English"
  default_player_name: "Unnamed"
