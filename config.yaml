# Straightjacket configuration
# General settings — API provider, language.
# For game mechanics, see engine.yaml.
# For AI prompts, see prompts.yaml.

# ── Server ────────────────────────────────────────────────────
server:
  host: "127.0.0.1"        # Bind address. Use "0.0.0.0" for LAN play.
  port: 8081

# ── AI provider ───────────────────────────────────────────────
# provider: "anthropic" or "openai_compatible"
# api_base: only needed for openai_compatible
# api_key_env: environment variable name that holds the API key

ai:
  provider: "openai_compatible"
  api_base: "https://api.cerebras.ai/v1"
  api_key_env: "CEREBRAS_API_KEY"
  prompts_file: "prompts.yaml"        # Per-provider prompt tuning: prompts_claude.yaml, prompts_glm47.yaml, etc.
  brain_model: "zai-glm-4.7"
  narrator_model: "zai-glm-4.7"
  director_model: "zai-glm-4.7"
  validator_model: "zai-glm-4.7"
  extra_body:
    reasoning_effort: "none"

  max_tokens:
    brain: 8192               # avg 97, json classification
    brain_setup: 8192        # character generation, larger json
    narrator: 8192           # avg 312, prose output (retries need room)
    narrator_metadata: 8192   # avg 101, npc extraction json
    opening_setup: 8192      # structured extraction from opening narration
    revelation_check: 8192    # single boolean + reasoning
    recap: 8192              # 4-6 sentences
    architect: 8192          # avg 833, story blueprint json
    director: 8192           # avg 364, guidance + reflections json
    correction: 8192         # correction analysis json
    chapter_summary: 8192    # summary json
    validator: 8192           # avg 96, pass/fail json
    validator_architect: 8192 # pass/fail + optional rewrites
  max_retries:
    brain: 3
    brain_setup: 3
    narrator: 3
    narrator_metadata: 3
    opening_setup: 3
    revelation_check: 3
    recap: 3
    architect: 3
    director: 3
    correction: 3
    chapter_summary: 3
    validator: 3
    validator_architect: 3
  max_tool_rounds:
    brain: 3                 # NPC lookup, oracle rolls before classification
    director: 3              # NPC/thread/clock queries before structured output
  temperature:
    brain: 0.6
    brain_setup: 0.6
    narrator: 1.0
    narrator_metadata: 0.3
    opening_setup: 0.6
    revelation_check: 0.3
    recap: 0.6
    architect: 0.8
    director: 0.8
    correction: 0.3
    chapter_summary: 0.6
    validator: 0.3
    validator_architect: 0.3
  top_p:
    default: 0.95              # Applied to all roles. Add per-role overrides here if needed.

# ── Language ──────────────────────────────────────────────────
language:
  narration_language: "English"
  default_player_name: "Unnamed"
