# Straightjacket configuration
# General settings — API provider, language.
# For game mechanics, see engine.yaml.
# For AI prompts, see prompts.yaml.

# ── Server ────────────────────────────────────────────────────
server:
  host: "127.0.0.1"        # Bind address. Use "0.0.0.0" for LAN play.
  port: 8081

# ── AI provider ───────────────────────────────────────────────
# provider: "anthropic" or "openai_compatible"
# api_base: only needed for openai_compatible
# api_key_env: environment variable name that holds the API key

ai:
  provider: "openai_compatible"
  api_base: "https://api.cerebras.ai/v1"
  api_key_env: "CEREBRAS_API_KEY"
  brain_model: "zai-glm-4.7"
  narrator_model: "zai-glm-4.7"
  director_model: "zai-glm-4.7"
  validator_model: "zai-glm-4.7"
  extra_body:
    disable_reasoning: true

  max_tokens:
    brain: 8192
    brain_setup: 8192
    narrator: 8192
    narrator_metadata: 8192
    opening_setup: 8192
    revelation_check: 8192
    recap: 8192
    architect: 8192
    director: 8192
    correction: 8192
    chapter_summary: 8192
    validator: 1024
    validator_architect: 1024
  max_retries:
    brain: 2
    brain_setup: 2
    narrator: 3
    narrator_metadata: 2
    opening_setup: 2
    revelation_check: 2
    recap: 1
    architect: 2
    director: 1
    correction: 2
    chapter_summary: 1
    validator: 1
    validator_architect: 1
  temperature:
    brain: 0.4
    brain_setup: 0.5
    narrator: 0.8
    narrator_metadata: 0.3
    opening_setup: 0.5
    revelation_check: 0.2
    recap: 0.6
    architect: 0.6
    director: 0.5
    correction: 0.3
    chapter_summary: 0.4
    validator: 0.2
    validator_architect: 0.2
  top_p:
    default: 0.95              # Applied to all roles. Add per-role overrides here if needed.

# ── Language ──────────────────────────────────────────────────
language:
  narration_language: "English"
  default_player_name: "Unnamed"
