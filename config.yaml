# Straightjacket configuration
# For game mechanics, see engine.yaml. For AI prompts, see prompts.yaml.

server:
  host: "127.0.0.1"
  port: 8081

ai:
  provider: "openai_compatible"
  api_base: "https://api.cerebras.ai/v1"
  api_key_env: "CEREBRAS_API_KEY"
  prompts_file: "prompts.yaml"

  # ── Model clusters ──────────────────────────────────────────
  # Every field is required. No hidden defaults.
  #
  # Built-in role → cluster mapping (override via role_cluster):
  #   creative:       narrator, architect
  #   classification: brain, correction
  #   tool_calling:   director
  #   analytical:     validator, validator_architect
  #   extraction:     narrator_metadata, opening_setup, revelation_check, chapter_summary, recap
  clusters:
    creative:
      model: "zai-glm-4.7"
      temperature: 0.9
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3
      extra_body:
        reasoning_effort: "none"
    classification:
      model: "zai-glm-4.7"
      temperature: 0.5
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3
      extra_body:
        reasoning_effort: "none"
    tool_calling:
      model: "zai-glm-4.7"
      temperature: 0.8
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3
      extra_body:
        reasoning_effort: "none"
    analytical:
      model: "gpt-oss-120b"
      temperature: 0.3
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3
    extraction:
      model: "gpt-oss-120b"
      temperature: 0.3
      top_p: 0.95
      max_tokens: 8192
      max_retries: 3

  # ── Per-role overrides ──────────────────────────────────────
  # Take precedence over cluster values.

  # role_model:
  #   brain: "qwen3-235b-instruct"

  # role_cluster:
  #   architect: "extraction"        # Use cheap model for blueprints

  temperature:
    narrator: 1.0
    architect: 0.8
    brain: 0.6
    correction: 0.3
    narrator_metadata: 0.3
    opening_setup: 0.6
    revelation_check: 0.3
    recap: 0.6
    chapter_summary: 0.6
    validator: 0.3
    validator_architect: 0.3
    director: 0.8

  max_tool_rounds:
    director: 3

  extra_body:
    validator: {}
    validator_architect: {}
    narrator_metadata: {}
    opening_setup: {}
    revelation_check: {}
    recap: {}
    chapter_summary: {}

language:
  narration_language: "English"
  default_player_name: "Unnamed"
